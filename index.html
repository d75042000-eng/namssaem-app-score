<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>남쌤 ERC 학원 · 시험·숙제 체크</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#10161d;
    --ink-2:#1a222c;
    --ink-3:#232d38;
    --ink-line: rgba(255,255,255,0.08);
    --paper:#f6f4ee;
    --paper-2:#eeebe1;
    --paper-line: rgba(16,22,29,0.10);
    --card:#ffffff;
    --text-strong:#1c1f23;
    --text:#3c4249;
    --text-soft:#767c85;
    --brass:#9c7a3c;
    --brass-light:#c9a86a;
    --brass-dim: rgba(156,122,60,0.14);
    --green:#4c7a5e;
    --green-bg:#e7efe9;
    --amber:#c07f22;
    --amber-bg:#faf0dd;
    --red:#a23b3b;
    --red-bg:#f7e6e4;
    --watch:#6d5892;
    --watch-bg:#ece7f2;
    --shadow-1: 0 1px 2px rgba(16,22,29,0.06), 0 8px 24px -12px rgba(16,22,29,0.18);
    --shadow-2: 0 20px 60px -20px rgba(16,22,29,0.35);
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Noto Sans KR', sans-serif;
    background:var(--paper);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .serif{ font-family:'Noto Serif KR', serif; }
  .mono{ font-family:'IBM Plex Mono', monospace; }
  ::selection{ background: var(--brass-dim); }

  a{color:inherit;}
  button{ font-family:inherit; cursor:pointer; }
  input, select, textarea{ font-family:inherit; }

  /* ---------- App shell ---------- */
  #app{ display:flex; min-height:100vh; }

  .sidebar{
    width:250px; flex-shrink:0;
    background: var(--ink);
    color:#eef0f2;
    display:flex; flex-direction:column;
    position:sticky; top:0; height:100vh;
    z-index: 20;
  }
  .sidebar-brand{
    padding:26px 22px 20px;
    border-bottom:1px solid var(--ink-line);
    display:flex; align-items:center; gap:12px;
  }
  .brand-mark{
    width:40px; height:40px; border-radius:50%;
    border:1.5px solid var(--brass-light);
    display:flex; align-items:center; justify-content:center;
    font-family:'Noto Serif KR', serif; font-weight:700; font-size:16px;
    color:var(--brass-light);
    flex-shrink:0;
    position:relative;
  }
  .brand-mark::after{
    content:''; position:absolute; inset:4px; border-radius:50%;
    border:1px solid rgba(201,168,106,0.35);
  }
  .brand-text .title{ font-family:'Noto Serif KR', serif; font-size:15.5px; font-weight:600; letter-spacing:.2px; color:#f4f1e9; line-height:1.3;}
  .brand-text .sub{ font-size:11px; color:#98a0aa; letter-spacing:.4px; margin-top:2px;}

  .sidebar-nav{ padding:18px 12px; flex:1; overflow-y:auto; }
  .nav-section-label{
    font-size:10.5px; color:#6d7580; letter-spacing:1.2px; text-transform:uppercase;
    padding:14px 12px 8px;
  }
  .nav-item{
    display:flex; align-items:center; gap:11px;
    padding:10px 12px; border-radius:10px;
    color:#c4cad1; font-size:14px; font-weight:500;
    text-decoration:none; margin-bottom:2px;
    border:1px solid transparent;
    transition: background .15s ease, color .15s ease;
  }
  .nav-item svg{ width:17px; height:17px; opacity:.85; flex-shrink:0; }
  .nav-item:hover{ background: var(--ink-2); color:#fff; }
  .nav-item.active{
    background: linear-gradient(180deg, rgba(201,168,106,0.16), rgba(201,168,106,0.06));
    color:#f4e9d4; border-color: rgba(201,168,106,0.30);
  }
  .nav-item.active svg{ opacity:1; }

  .sidebar-footer{ padding:16px; border-top:1px solid var(--ink-line); }
  .role-card{
    background:var(--ink-2); border:1px solid var(--ink-line);
    border-radius:12px; padding:12px 14px; display:flex; align-items:center; gap:10px;
    cursor:pointer;
  }
  .role-avatar{
    width:34px; height:34px; border-radius:50%; flex-shrink:0;
    background: var(--brass-dim); color:var(--brass-light);
    display:flex; align-items:center; justify-content:center;
    font-family:'Noto Serif KR', serif; font-weight:700; font-size:14px;
  }
  .role-name{ font-size:13px; font-weight:600; color:#f0ede4; }
  .role-switch{ font-size:11px; color:#8a919b; margin-top:1px;}

  /* ---------- Main ---------- */
  .main{ flex:1; min-width:0; display:flex; flex-direction:column; }
  .topbar{
    position:sticky; top:0; z-index:10;
    background: rgba(246,244,238,0.88); backdrop-filter: blur(8px);
    border-bottom:1px solid var(--paper-line);
    padding:20px 36px; display:flex; align-items:flex-end; justify-content:space-between; gap:20px;
  }
  .topbar .eyebrow{ font-size:12px; color:var(--brass); letter-spacing:1px; font-weight:700; margin-bottom:6px; }
  .topbar h1{ font-family:'Noto Serif KR', serif; font-size:25px; font-weight:700; color:var(--text-strong); margin:0; letter-spacing:-.2px;}
  .topbar .desc{ font-size:13px; color:var(--text-soft); margin-top:6px; }
  .topbar-right{ display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .today-chip{
    font-size:12.5px; color:var(--text-soft); background:var(--card); border:1px solid var(--paper-line);
    padding:8px 14px; border-radius:999px; display:flex; align-items:center; gap:7px;
  }

  .content{ padding:28px 36px 60px; max-width:1320px; width:100%; margin:0 auto; }
  .view{ display:none; animation: fadein .25s ease; }
  .view.active{ display:block; }
  @keyframes fadein{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

  /* ---------- Buttons ---------- */
  .btn{
    display:inline-flex; align-items:center; gap:7px; justify-content:center;
    padding:9px 16px; border-radius:9px; font-size:13.5px; font-weight:600;
    border:1px solid var(--paper-line); background:var(--card); color:var(--text-strong);
    transition: all .15s ease; white-space:nowrap;
  }
  .btn:hover{ border-color:#c9c3b3; background:#fbfaf6; }
  .btn svg{ width:15px; height:15px; }
  .btn-primary{ background:var(--ink); color:#f4f1e9; border-color:var(--ink); }
  .btn-primary:hover{ background:#232d38; }
  .btn-brass{ background:var(--brass); color:#fff; border-color:var(--brass); }
  .btn-brass:hover{ background:#8a6a35; }
  .btn-ghost{ background:transparent; border-color:transparent; color:var(--text-soft); }
  .btn-ghost:hover{ background:var(--paper-2); color:var(--text-strong); }
  .btn-danger-line{ color:var(--red); border-color:rgba(162,59,59,0.3); background:#fff; }
  .btn-sm{ padding:6px 11px; font-size:12.5px; border-radius:7px; }
  .btn:disabled{ opacity:.45; cursor:not-allowed; }

  /* ---------- Card / table ---------- */
  .card{ background:var(--card); border:1px solid var(--paper-line); border-radius:var(--radius); box-shadow:var(--shadow-1); }
  .card-pad{ padding:22px 24px; }
  .card-header{ display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--paper-line); gap:14px; flex-wrap:wrap;}
  .card-header h3{ margin:0; font-family:'Noto Serif KR', serif; font-size:16.5px; font-weight:600; color:var(--text-strong);}
  .card-header .hint{ font-size:12px; color:var(--text-soft); margin-top:3px;}

  table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  thead th{
    text-align:left; font-size:11.5px; letter-spacing:.4px; text-transform:uppercase;
    color:var(--text-soft); font-weight:600; padding:11px 16px; border-bottom:1px solid var(--paper-line);
    background:#fbfaf6;
  }
  tbody td{ padding:13px 16px; border-bottom:1px solid #f1efe7; color:var(--text); vertical-align:middle;}
  tbody tr:last-child td{ border-bottom:none; }
  tbody tr:hover{ background:#fbfaf6; }
  .table-wrap{ overflow-x:auto; }

  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12.5px; font-weight:600; color:var(--text); margin-bottom:6px; }
  .field input, .field select, .field textarea{
    width:100%; padding:9px 12px; border-radius:8px; border:1px solid #d8d3c4;
    font-size:13.5px; color:var(--text-strong); background:#fff;
  }
  .field input:focus, .field select:focus, .field textarea:focus{ outline:none; border-color:var(--brass); box-shadow:0 0 0 3px var(--brass-dim); }
  .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .field .req{ color:var(--red); }

  .badge{ display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:999px; font-size:11.5px; font-weight:700; letter-spacing:.2px;}
  .badge-class{ background:var(--brass-dim); color:#7a5f2e; }
  .pill{ padding:3px 9px; border-radius:7px; font-size:11.5px; font-weight:600; }
  .pill-ok{ background:var(--green-bg); color:var(--green); }
  .pill-warn{ background:var(--amber-bg); color:var(--amber); }
  .pill-bad{ background:var(--red-bg); color:var(--red); }
  .pill-watch{ background:var(--watch-bg); color:var(--watch); }
  .pill-mute{ background:#efece3; color:var(--text-soft); }

  /* ---------- Seal (signature element) ---------- */
  .seal{
    width:34px; height:34px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; position:relative;
    font-family:'Noto Serif KR', serif; font-weight:700; font-size:13px;
  }
  .seal::before{ content:''; position:absolute; inset:-3px; border-radius:50%; border:1px solid currentColor; opacity:.35; }
  .seal.g{ background:var(--green-bg); color:var(--green); }
  .seal.y{ background:var(--amber-bg); color:var(--amber); }
  .seal.r{ background:var(--red-bg); color:var(--red); }
  .seal.n{ background:#eee; color:#999; }
  .seal-lg{ width:52px; height:52px; font-size:19px; }
  .seal-sm{ width:22px; height:22px; font-size:0; }
  .seal-sm::after{ content:''; width:7px; height:7px; border-radius:50%; background:currentColor; }

  .seal-row{ display:flex; gap:5px; align-items:center; }

  /* ---------- Stat cards ---------- */
  .stat-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px; }
  .stat-card{
    background:var(--card); border:1px solid var(--paper-line); border-radius:var(--radius);
    padding:20px 20px 18px; position:relative; overflow:hidden;
  }
  .stat-card .stat-label{ font-size:12px; color:var(--text-soft); font-weight:600; letter-spacing:.2px; }
  .stat-card .stat-num{ font-family:'Noto Serif KR', serif; font-size:34px; font-weight:700; color:var(--text-strong); margin-top:6px; line-height:1;}
  .stat-card .stat-sub{ font-size:11.5px; color:var(--text-soft); margin-top:8px; }
  .stat-card .stat-bar{ position:absolute; left:0; top:0; bottom:0; width:4px; }
  .stat-bar.green{ background:var(--green); } .stat-bar.amber{ background:var(--amber);} .stat-bar.red{background:var(--red);} .stat-bar.ink{background:var(--ink);} .stat-bar.watch{background:var(--watch);}

  /* ---------- 경영 대시보드: 수평 막대 ---------- */
  .hbar-row{ display:flex; align-items:center; gap:12px; padding:6px 0; }
  .hbar-label{ width:118px; flex-shrink:0; font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .hbar-track{ flex:1; height:10px; background:var(--paper-2); border-radius:6px; overflow:hidden; }
  .hbar-fill{ height:100%; border-radius:6px; background:var(--brass); }
  .hbar-fill.ink{ background:var(--ink-3); }
  .hbar-num{ width:38px; text-align:right; font-size:13px; font-weight:700; color:var(--text-strong); flex-shrink:0; }
  .kpi-row2{ display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:20px; }
  .mini-stat{ background:var(--card); border:1px solid var(--paper-line); border-radius:var(--radius); padding:18px 20px; }
  .mini-stat .lbl{ font-size:12px; color:var(--text-soft); font-weight:600; }
  .mini-stat .val{ font-family:'Noto Serif KR', serif; font-size:28px; font-weight:700; color:var(--text-strong); margin-top:4px; }
  .mini-stat .sub{ font-size:11.5px; color:var(--text-soft); margin-top:6px; }

  /* ---------- Utility ---------- */
  .flex{ display:flex; align-items:center; }
  .gap-8{ gap:8px; } .gap-10{ gap:10px; } .gap-14{ gap:14px; }
  .between{ justify-content:space-between; }
  .wrap{ flex-wrap:wrap; }
  .muted{ color:var(--text-soft); }
  .mt-0{margin-top:0;} .mb-0{margin-bottom:0;}
  .search-input{ position:relative; }
  .search-input svg{ position:absolute; left:12px; top:50%; transform:translateY(-50%); width:15px; height:15px; color:var(--text-soft); }
  .search-input input{ padding-left:34px; }
  .toolbar{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
  .chip-filter{
    padding:6px 13px; border-radius:999px; font-size:12.5px; font-weight:600; border:1px solid var(--paper-line);
    background:var(--card); color:var(--text-soft); flex-shrink:0;
  }
  .chip-filter.active{ background:var(--ink); color:#f4f1e9; border-color:var(--ink); }
  .empty-state{ text-align:center; padding:60px 20px; color:var(--text-soft); }
  .empty-state svg{ width:38px; height:38px; margin-bottom:10px; opacity:.5; }

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(16,22,29,0.55); display:none;
    align-items:center; justify-content:center; z-index:100; padding:20px; backdrop-filter: blur(2px);
  }
  .modal-overlay.active{ display:flex; }
  .modal{
    background:#fff; border-radius:16px; width:100%; max-width:560px; max-height:88vh; overflow-y:auto;
    box-shadow:var(--shadow-2); animation: modalIn .18s ease;
  }
  @keyframes modalIn{ from{opacity:0; transform:translateY(10px) scale(.98);} to{opacity:1; transform:translateY(0) scale(1);} }
  .modal-head{ padding:20px 24px; border-bottom:1px solid var(--paper-line); display:flex; align-items:center; justify-content:space-between; }
  .modal-head h3{ margin:0; font-family:'Noto Serif KR', serif; font-size:17px; }
  .modal-body{ padding:22px 24px; }
  .modal-foot{ padding:16px 24px; border-top:1px solid var(--paper-line); display:flex; justify-content:flex-end; gap:8px; }
  .modal-close{ width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--text-soft); background:transparent; border:none;}
  .modal-close:hover{ background:var(--paper-2); }

  /* toast */
  #toast-wrap{ position:fixed; bottom:22px; right:22px; z-index:200; display:flex; flex-direction:column; gap:8px; }
  .toast{
    background:var(--ink); color:#f4f1e9; padding:12px 18px; border-radius:10px; font-size:13px; font-weight:500;
    box-shadow:var(--shadow-2); display:flex; align-items:center; gap:10px; animation: toastIn .2s ease;
    border:1px solid rgba(201,168,106,0.25);
  }
  @keyframes toastIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  /* login */
  .login-screen{ min-height:100vh; display:flex; align-items:center; justify-content:center; background: radial-gradient(circle at 20% 10%, #1c242e, var(--ink) 60%); padding:20px;}
  .login-card{ background:var(--paper); border-radius:20px; width:100%; max-width:440px; padding:40px 38px; box-shadow:var(--shadow-2); }
  .login-brand{ text-align:center; margin-bottom:26px; }
  .login-brand .brand-mark{ width:56px; height:56px; font-size:22px; margin:0 auto 14px; border-color:var(--brass); color:var(--brass); }
  .login-brand h1{ font-family:'Noto Serif KR', serif; font-size:21px; margin:0 0 4px; color:var(--text-strong);}
  .login-brand p{ font-size:12.5px; color:var(--text-soft); margin:0; letter-spacing:.3px;}
  .role-option{
    display:flex; align-items:center; gap:13px; padding:14px 16px; border-radius:12px; border:1.5px solid var(--paper-line);
    background:#fff; margin-bottom:10px; cursor:pointer; transition: all .15s ease;
  }
  .role-option:hover{ border-color:var(--brass-light); }
  .role-option .role-icon{ width:38px; height:38px; border-radius:50%; background:var(--brass-dim); color:var(--brass); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .role-option .role-icon svg{ width:18px; height:18px; }
  .role-option .rt{ font-size:14px; font-weight:700; color:var(--text-strong); }
  .role-option .rs{ font-size:12px; color:var(--text-soft); margin-top:1px;}
  .role-option .arrow{ margin-left:auto; color:var(--text-soft); }

  /* legend */
  .legend{ display:flex; gap:16px; flex-wrap:wrap; font-size:12.5px; color:var(--text-soft); }
  .legend .item{ display:flex; align-items:center; gap:6px; }
  .legend .dot{ width:9px; height:9px; border-radius:50%; }

  /* status buttons for homework */
  .status-btns{ display:flex; gap:6px; flex-wrap:wrap; }
  .status-btn{
    padding:6px 11px; border-radius:7px; font-size:12px; font-weight:600; border:1.5px solid #e1ddd0; background:#fff; color:var(--text-soft);
  }
  .status-btn.sel-ok{ background:var(--green-bg); border-color:var(--green); color:var(--green); }
  .status-btn.sel-warn{ background:var(--amber-bg); border-color:var(--amber); color:var(--amber); }
  .status-btn.sel-bad{ background:var(--red-bg); border-color:var(--red); color:var(--red); }

  /* 영상숙제: 챕터별 한 화면 체크용 셀렉트 */
  .vsel-cell{ padding:6px 8px !important; }
  .vsel{ width:100%; min-width:96px; padding:7px 6px; border-radius:7px; border:1.5px solid #e1ddd0; font-size:12px; font-weight:600; background:#fff; color:var(--text-soft); appearance:none; -webkit-appearance:none; text-align:center; }
  .vsel.vsel-ok{ background:var(--green-bg); border-color:var(--green); color:var(--green); }
  .vsel.vsel-warn{ background:var(--amber-bg); border-color:var(--amber); color:var(--amber); }
  .vsel.vsel-bad{ background:var(--red-bg); border-color:var(--red); color:var(--red); }
  .video-chapter-head{ display:flex; flex-direction:column; align-items:center; gap:2px; }
  .video-chapter-head .cnt{ font-size:10.5px; font-weight:600; color:var(--text-soft); }
  .video-chapter-head .cnt.done{ color:var(--green); }

  .divider{ height:1px; background:var(--paper-line); margin:18px 0; }

  .checklist-row{ display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid #f1efe7;}
  .checklist-row:last-child{ border-bottom:none; }

  .print-only{ display:none; }

  @media print{
    .sidebar, .topbar, .no-print{ display:none !important; }
    .content{ padding:0; max-width:100%; }
    body{ background:#fff; }
    .print-only{ display:block; }
  }

  @media (max-width: 980px){
    .sidebar{ width:210px; }
    .stat-grid{ grid-template-columns:repeat(2,1fr); }
    .field-row{ grid-template-columns:1fr; }
  }
  @media (max-width: 760px){
    #app{ flex-direction:column; }
    .sidebar{ width:100%; height:auto; position:relative; flex-direction:column; align-items:stretch; }
    .sidebar-brand{ border-bottom:1px solid var(--ink-line); flex-shrink:0; position:relative; }
    .mobile-nav-toggle{ display:flex; margin-left:auto; background:transparent; border:none; color:#eef0f2; padding:6px; }
    .sidebar-nav{
      display:none; flex-direction:column; padding:8px;
      position:absolute; top:100%; left:0; right:0; z-index:60;
      background:var(--ink); max-height:70vh; overflow-y:auto;
      box-shadow:0 12px 30px rgba(0,0,0,0.35);
    }
    .sidebar-nav.mobile-open{ display:flex; }
    .nav-item{ flex-direction:row; font-size:14px; gap:11px; padding:12px 14px; white-space:nowrap;}
    .sidebar-footer{ display:none; }
    .topbar{ padding:16px 18px; flex-direction:column; align-items:flex-start; gap:10px;}
    .content{ padding:18px; }
    .stat-grid{ grid-template-columns:1fr 1fr; }
  }
  .mobile-nav-toggle{ display:none; cursor:pointer; }
  .mobile-only-navitem{ display:none; }
  @media (max-width: 760px){
    .mobile-only-navitem{ display:flex; border-top:1px solid var(--ink-line); margin-top:6px; padding-top:14px; }
  }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- ========================= LOGIN ========================= -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-mark">N</div>
      <h1>남쌤 ERC 학원</h1>

function fmtDate(d){
  const dt = (d instanceof Date) ? d : new Date(d);
  const y = dt.getFullYear(), m=String(dt.getMonth()+1).padStart(2,'0'), day=String(dt.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function fmtDateKR(d){
  const dt=(d instanceof Date)?d:new Date(d);
  return `${dt.getFullYear()}년 ${dt.getMonth()+1}월 ${dt.getDate()}일`;
}

// 마지막 체크 시각을 "3분 전" 같은 상대 시간으로 표시 (여러 조교가 동시에 쓸 때 누가 방금 체크했는지 보여주기 위함)
function relativeTime(iso){
  if(!iso) return '';
  const diffMs = Date.now() - new Date(iso).getTime();
  const min = Math.floor(diffMs/60000);
  if(min<1) return '방금 전';
  if(min<60) return `${min}분 전`;
  const hr = Math.floor(min/60);
  if(hr<24) return `${hr}시간 전`;
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function isRecent(iso, mins){ if(!iso) return false; return (Date.now()-new Date(iso).getTime()) < mins*60000; }

async function loadDB(){
  try{
    const snap = await FIRESTORE_DOC.get();
    if(snap.exists){
      const parsed = snap.data();
      DB = Object.assign(DB, parsed);
      return true;
    }
  }catch(e){ console.error('불러오기 실패', e); }
  return false;
}

async function saveDB(){
  try{
    // Firestore는 undefined 값을 허용하지 않으므로 JSON 왕복으로 안전하게 정리합니다
    const clean = JSON.parse(JSON.stringify(DB));
    await FIRESTORE_DOC.set(clean);
    return true;
  }catch(e){
    console.error('저장 실패', e);
    toast('저장 중 문제가 발생했어요. 인터넷 연결을 확인해주세요.', true);
    return false;
  }
}

}

function getWeekKey(dateStr){
  const d = new Date(dateStr);
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = (dt.getUTCDay()+6)%7; // 월=0
  dt.setUTCDate(dt.getUTCDate()-dayNum+3);
  const firstThu = new Date(Date.UTC(dt.getUTCFullYear(),0,4));
  const week = 1 + Math.round(((dt-firstThu)/86400000 - 3 + ((firstThu.getUTCDay()+6)%7))/7);
  return `${dt.getUTCFullYear()}-W${String(week).padStart(2,'0')}`;
}
function currentWeekKey(){ return getWeekKey(fmtDate(new Date())); }

// 시험 종류별 기준 점수 조회 (개별 설정이 없으면 공통 기본값으로 대체)
function getExamThreshold(examType){
  if(DB.settings.examThresholds && DB.settings.examThresholds[examType]!=null){
    return DB.settings.examThresholds[examType];
  }
  return DB.settings.scoreThreshold || 70;
}

// 휴무일 판별 (공휴일·방학 등 학원 문을 안 연 날) — 미체크 카운터가 거짓 경보를 내지 않도록 씁니다
function holidayInfo(dateStr){ return DB.holidays.find(h=>h.date===dateStr) || null; }
function isHoliday(dateStr){ return !!holidayInfo(dateStr); }

// 주어진 날짜가 속한 주의 월요일~일요일 7개 날짜(YYYY-MM-DD)를 반환
function getWeekDates(dateStr){
  const d = new Date(dateStr);
  const dayNum = (d.getDay()+6)%7; // 월=0 ... 일=6
  const monday = new Date(d); monday.setDate(d.getDate()-dayNum);
  const out = [];
  for(let i=0;i<7;i++){ const x=new Date(monday); x.setDate(monday.getDate()+i); out.push(fmtDate(x)); }
  return out;
}
const DOW_LABEL = ['월','화','수','목','금','토','일'];

function getMonthKey(dateStr){
  const d = new Date(dateStr);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function currentMonthKey(){ return getMonthKey(fmtDate(new Date())); }

/* ---------------------- 4. 위험군 판정 로직 ---------------------- */
/*
  주간 위험군 판정 (매주 리셋 — 이번 주 데이터만 사용):
  - examIssues   : 이번 주 시험기록 중 기준 미달(score) 또는 미통과(pass/level) 건수
  - writingIssues: 이번 주 쓰기숙제 기록 중 '현장보완' 또는 '미제출' 건수
  - videoIssues  : 이번 주 영상숙제 기록 중 '정상제출'이 아닌 건수
  - 빨강: 세 항목 중 하나라도 settings.redIssueCount 이상
  - 노랑: 위 빨강 조건에 해당하지 않으면서 이슈 합계가 1개 이상
  - 초록: 이슈가 전혀 없음
*/
function computeWeeklyGrade(studentId, weekKey){
  const s = DB.students.find(x=>x.id===studentId);
  if(!s) return null;
  const exams = DB.examRecords.filter(r=>r.studentId===studentId && getWeekKey(r.date)===weekKey);
  const hws = DB.homeworkRecords.filter(r=>r.studentId===studentId && getWeekKey(r.date)===weekKey);

  const examDetail = [];
  let examIssues = 0;
  exams.forEach(r=>{
    const meta = EXAM_META[r.examType];
    let bad=false;
    if(meta.type==='score'){ bad = r.score < getExamThreshold(r.examType); }
    else { bad = r.passed===false; }
    if(bad){ examIssues++; examDetail.push(meta.name + (meta.type==='score' ? ` ${r.score}점 미달` : ' 미통과')); }
  });

  let writingIssues=0; const writingDetail=[];
  hws.filter(r=>r.type==='writing').forEach(r=>{
    if(r.status!=='제출완료'){ writingIssues++; writingDetail.push(`쓰기숙제 ${r.status}`); }
  });

  let videoIssues=0; const videoDetail=[];
  hws.filter(r=>r.type.startsWith('video_')).forEach(r=>{
    if(r.status!=='정상제출'){
      videoIssues++;
      const vt = VIDEO_TYPES.find(v=>v.key===r.type);
      videoDetail.push(`${vt?vt.name:r.type}영상 ${r.status}`);
    }
  });

  const totalIssues = examIssues+writingIssues+videoIssues;
  let grade='green';
  if(examIssues>=DB.settings.redIssueCount || writingIssues>=DB.settings.redIssueCount || videoIssues>=DB.settings.redIssueCount){
    grade='red';
  } else if(totalIssues>=DB.settings.yellowIssueCount){
    grade='yellow';
  }

  return {
    studentId, weekKey, grade,
    examIssues, writingIssues, videoIssues, totalIssues,
    detail: [...examDetail, ...writingDetail, ...videoDetail],
    hasAnyRecord: exams.length>0 || hws.length>0,
  };
}

function gradeLabel(g){ return g==='red' ? '위험' : g==='yellow' ? '주의' : g==='green' ? '정상' : '기록없음'; }
function gradeSealClass(g){ return g==='red'?'r':g==='yellow'?'y':g==='green'?'g':'n'; }
function gradeSealChar(g){ return g==='red'?'✕':g==='yellow'?'!':g==='green'?'✓':'-'; }

/*
  연속 위험군(관찰 필요) 판정:
  이번 주만 보면 괜찮아 보여도, 최근 N주 중 M주 이상 노랑/빨강이었다면
  "관찰 필요" 학생으로 별도 표시합니다. 매주 리셋되는 등급만으로는
  이런 반복 패턴이 묻히기 때문에 따로 계산합니다.
  N(watchWindowWeeks), M(watchThreshold)은 설정 화면에서 조정할 수 있습니다.
*/
function computeWatchFlag(studentId){
  const windowWeeks = (DB.settings.watchWindowWeeks) || 3;
  const threshold = (DB.settings.watchThreshold) || 2;
  const weeks = [];
  for(let i=windowWeeks-1;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-7*i); weeks.push(getWeekKey(fmtDate(d))); }
  const grades = weeks.map(w=>computeWeeklyGrade(studentId, w));
  const badWeeks = grades.filter(g=>g.hasAnyRecord && (g.grade==='yellow' || g.grade==='red'));
  return { watch: badWeeks.length>=threshold, badCount: badWeeks.length, windowWeeks, threshold, weeks, grades };
}

function toast(msg, isError){
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className='toast';
  el.style.borderColor = isError ? 'rgba(162,59,59,0.4)' : 'rgba(201,168,106,0.25)';
  el.innerHTML = `<span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .3s ease'; el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 2600);
}

function esc(s){ return (s===undefined||s===null) ? '' : String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function studentName(id){ const s=DB.students.find(x=>x.id===id); return s? s.name : '(삭제됨)'; }
function studentById(id){ return DB.students.find(x=>x.id===id); }

// 형제/자매 판별: 학부모 연락처가 같으면(하이픈 등 표기 차이 무시) 같은 가구로 간주합니다
function normalizePhone(p){ return (p||'').replace(/\D/g,''); }
function householdOf(studentId){
  const s = studentById(studentId);
  if(!s) return [];
  const norm = normalizePhone(s.parentPhone);
  if(!norm) return [s];
  return DB.students.filter(x=> normalizePhone(x.parentPhone)===norm);
}

  'report': {eyebrow:'REPORT', title:'월간 리포트', desc:'한 달 치 성적·숙제 현황을 정리해 학부모에게 전달합니다'},
  'term-report': {eyebrow:'ANALYTICS', title:'학기·분기 리포트', desc:'긴 기간의 흐름과 반별 비교를 한눈에 확인합니다'},
  'settings': {eyebrow:'SETTINGS', title:'설정', desc:'위험군 판정 기준과 반별 시험 매칭을 조정합니다'},
};

// Firestore onSnapshot 실시간 리스너로 대체되어, 더 이상 15초 폴링이 필요 없습니다.
// (호출부 호환을 위해 함수는 남겨두되 아무 동작도 하지 않습니다)
function stopLiveSync(){}
function startLiveSync(key){}

function renderView(key){
  currentView = key;
  renderNav();
  const meta = VIEW_META[key];
  document.getElementById('topbar-eyebrow').textContent = meta.eyebrow;
  document.getElementById('topbar-title').textContent = meta.title;
  document.getElementById('topbar-desc').textContent = meta.desc;
  const root = document.getElementById('content-root');
  root.innerHTML = '<div class="view active" id="view-inner"></div>';
  const inner = document.getElementById('view-inner');

  if(key==='overview') renderOverview(inner);
  else if(key==='dashboard') renderDashboard(inner);
  else if(key==='students') renderStudents(inner);
  else if(key==='exam-input') renderExamInput(inner);
  else if(key==='homework-writing') renderHomeworkWriting(inner);
  else if(key==='homework-video') renderHomeworkVideo(inner);
  else if(key==='remedial') renderRemedial(inner);
  else if(key==='report') renderReport(inner);
  else if(key==='term-report') renderTermReport(inner);
  else if(key==='settings') renderSettings(inner);

  startLiveSync(key);
  window.scrollTo({top:0, behavior:'instant'});
}

/* ---------------------- 7-1. 경영 대시보드 ---------------------- */

function renderOverview(root){
  const now = new Date();
  const thisMonth = fmtDate(now).slice(0,7); // 'YYYY-MM'
  const active = DB.students.filter(s=>(s.status||'재원')==='재원');
  const totalActive = active.length;

  // 이번 달 신규 / 퇴원
  const newThisMonth = DB.students.filter(s=> (s.registeredAt||'').slice(0,7)===thisMonth).length;
  const withdrawnThisMonth = (DB.statusHistory||[]).filter(h=> h.toStatus==='퇴원' && (h.changedAt||'').slice(0,10).slice(0,7)===thisMonth).length;

  // 위험군 / 관찰 필요 (재원생 기준, 이번 주 등급)
  const wk = currentWeekKey();
  let riskCount = 0, watchCount = 0;
  active.forEach(s=>{
    const g = computeWeeklyGrade(s.id, wk);
    const w = computeWatchFlag(s.id);
    if(g.hasAnyRecord && g.grade==='red') riskCount++;
    if(w.watch) watchCount++;
  });

  // 반별 인원 분포
  const classCounts = CLASSES.map(c=>({ c, n: active.filter(s=>s.className===c).length }));
  const maxClassCount = Math.max(1, ...classCounts.map(x=>x.n));

  // 학교별 분포 (상위 8개)
  const schoolMap = {};
  active.forEach(s=>{ const sc = (s.school||'').trim() || '학교 미입력'; schoolMap[sc]=(schoolMap[sc]||0)+1; });
  const schoolList = Object.entries(schoolMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxSchool = Math.max(1, ...schoolList.map(x=>x[1]));

  // 유입경로 분포 (재원생 중 입력된 학생만)
  const chanMap = {};
  active.forEach(s=>{ const rs=(s.referralSource||'').trim(); if(rs) chanMap[rs]=(chanMap[rs]||0)+1; });
  const chanEntered = Object.values(chanMap).reduce((a,b)=>a+b,0);
  const chanList = Object.entries(chanMap).sort((a,b)=>b[1]-a[1]);
  const chanUnknown = totalActive - chanEntered;
  const maxChan = Math.max(1, ...chanList.map(x=>x[1]), chanUnknown);

  // 형제자매 등록 비율
  let siblingCount = 0;
  active.forEach(s=>{ if(householdOf(s.id).filter(x=>x.id!==s.id).length) siblingCount++; });
  const siblingPct = totalActive? Math.round(siblingCount/totalActive*100) : 0;

  // 평균 재원 기간 (재원생 중 등록일이 있는 학생)
  const withReg = active.filter(s=>s.registeredAt);
  let avgMonths = null;
  if(withReg.length){
    const total = withReg.reduce((sum,s)=>{
      const reg = new Date(s.registeredAt);
      const m = (now.getFullYear()-reg.getFullYear())*12 + (now.getMonth()-reg.getMonth());
      return sum + Math.max(0,m);
    },0);
    avgMonths = Math.round((total/withReg.length)*10)/10;
  }

  // 최근 퇴원 학생 (최대 6건)
  const withdrawals = (DB.statusHistory||[]).filter(h=>h.toStatus==='퇴원')
    .sort((a,b)=> (b.changedAt||'').localeCompare(a.changedAt||'')).slice(0,6)
    .map(h=>({ h, s: studentById(h.studentId) }));

  root.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-bar ink"></div><div class="stat-label">재원생 수</div><div class="stat-num">${totalActive}</div><div class="stat-sub">전체 등록 ${DB.students.length}명 중</div></div>
      <div class="stat-card"><div class="stat-bar green"></div><div class="stat-label">이번 달 신규</div><div class="stat-num">+${newThisMonth}</div><div class="stat-sub">${thisMonth} 등록 기준</div></div>
      <div class="stat-card"><div class="stat-bar red"></div><div class="stat-label">이번 달 퇴원</div><div class="stat-num">-${withdrawnThisMonth}</div><div class="stat-sub">${thisMonth} 퇴원 처리 기준</div></div>
      <div class="stat-card"><div class="stat-bar watch"></div><div class="stat-label">위험군 · 관찰 필요</div><div class="stat-num">${riskCount} / ${watchCount}</div><div class="stat-sub">위험(빨강) / 관찰 필요 · <a href="javascript:void(0)" onclick="renderView('dashboard')" style="color:var(--brass); font-weight:700;">주간 대시보드 →</a></div></div>
    </div>

    <div class="kpi-row2">
      <div class="mini-stat"><div class="lbl">형제·자매 등록 비율</div><div class="val">${siblingPct}%</div><div class="sub">재원생 ${totalActive}명 중 ${siblingCount}명이 형제·자매 함께 등록</div></div>
      <div class="mini-stat"><div class="lbl">평균 재원 기간</div><div class="val">${avgMonths===null? '-' : avgMonths+'개월'}</div><div class="sub">${withReg.length? `등록일이 입력된 재원생 ${withReg.length}명 기준` : '등록일이 입력된 학생이 없어요'}</div></div>
    </div>

    <div class="card" style="margin-bottom:20px;">
      <div class="card-header"><div><h3>반별 인원 분포</h3><div class="hint">재원생 기준</div></div></div>
      <div class="card-pad">
        ${classCounts.filter(x=>x.n>0 || true).map(({c,n})=>`
          <div class="hbar-row">
            <div class="hbar-label" title="${classLabel(c)}">${classLabel(c)}</div>
            <div class="hbar-track"><div class="hbar-fill" style="width:${n/maxClassCount*100}%"></div></div>
            <div class="hbar-num">${n}명</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="card" style="margin-bottom:20px;">
      <div class="card-header"><div><h3>학교별 분포</h3><div class="hint">재원생이 많은 학교 상위 ${schoolList.length}곳</div></div></div>
      <div class="card-pad">
        ${schoolList.length? schoolList.map(([sc,n])=>`
          <div class="hbar-row">
            <div class="hbar-label" title="${esc(sc)}">${esc(sc)}</div>
            <div class="hbar-track"><div class="hbar-fill ink" style="width:${n/maxSchool*100}%"></div></div>
            <div class="hbar-num">${n}명</div>
          </div>
        `).join('') : `<div class="empty-state">학교 정보가 입력된 학생이 없어요</div>`}
      </div>
    </div>

    <div class="card" style="margin-bottom:20px;">
      <div class="card-header"><div><h3>유입경로별 신규 등록 분포</h3><div class="hint">원생 목록의 "유입경로" 항목 기준 · 채널별 조회수와 비교하면 전환율을 계산할 수 있어요</div></div></div>
      <div class="card-pad">
        ${chanList.length? chanList.map(([ch,n])=>`
          <div class="hbar-row">
            <div class="hbar-label" title="${esc(ch)}">${esc(ch)}</div>
            <div class="hbar-track"><div class="hbar-fill" style="width:${n/maxChan*100}%"></div></div>
            <div class="hbar-num">${n}명</div>
          </div>
        `).join('') : ''}
        ${chanUnknown>0? `
          <div class="hbar-row">
            <div class="hbar-label muted">경로 미입력</div>
            <div class="hbar-track"><div class="hbar-fill" style="width:${chanUnknown/maxChan*100}%; background:#c9c3b3;"></div></div>
            <div class="hbar-num muted">${chanUnknown}명</div>
          </div>` : ''}
        ${(!chanList.length && !chanUnknown)? `<div class="empty-state">재원생이 없어요</div>` : ''}
      </div>
    </div>

    <div class="card">
      <div class="card-header"><div><h3>최근 퇴원 학생</h3><div class="hint">최근 6건 · 사유는 상태 변경 시 남긴 메모예요</div></div></div>
      <div class="card-pad">
        <div class="table-wrap">
          <table>
            <thead><tr><th>퇴원일</th><th>이름</th><th>반</th><th>사유</th></tr></thead>
            <tbody>
              ${withdrawals.length? withdrawals.map(({h,s})=>`
                <tr>
                  <td class="mono">${esc((h.changedAt||'').slice(0,10))}</td>
                  <td>${s? esc(s.name) : '(삭제된 학생)'}</td>
                  <td>${s? `<span class="badge badge-class">${classLabel(s.className)}</span>` : ''}</td>
                  <td class="muted">${esc(h.note||'-')}</td>
                </tr>
              `).join('') : `<tr><td colspan="4"><div class="empty-state">최근 퇴원 기록이 없어요</div></td></tr>`}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

/* ---------------------- 8. 대시보드 (주간 위험군) ---------------------- */

function renderDashboard(root){
  const wk = currentWeekKey();
  const grades = DB.students.filter(s=>((s.status||'재원')==='재원')).map(s=>({s, g: computeWeeklyGrade(s.id, wk), w: computeWatchFlag(s.id)}));
  const counts = { green:0, yellow:0, red:0, none:0, watch:0 };
  grades.forEach(({g,w})=>{
    if(!g.hasAnyRecord) counts.none++;
    else counts[g.grade]++;
    if(w.watch) counts.watch++;
  });

  root.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-bar green"></div><div class="stat-label">정상 (초록)</div><div class="stat-num">${counts.green}</div><div class="stat-sub">재원 ${grades.length}명 중</div></div>
      <div class="stat-card"><div class="stat-bar amber"></div><div class="stat-label">주의 (노랑)</div><div class="stat-num">${counts.yellow}</div><div class="stat-sub">가벼운 미달 1건</div></div>
      <div class="stat-card"><div class="stat-bar red"></div><div class="stat-label">위험 (빨강) · 보강대상</div><div class="stat-num">${counts.red}</div><div class="stat-sub">반복 미달 2건 이상</div></div>
      <div class="stat-card"><div class="stat-bar watch"></div><div class="stat-label">관찰 필요</div><div class="stat-num">${counts.watch}</div><div class="stat-sub">최근 ${DB.settings.watchWindowWeeks||3}주 중 ${DB.settings.watchThreshold||2}주 이상</div></div>
    </div>

    <div class="card" style="margin-bottom:20px;">
      <div class="card-header">
        <div>
          <h3>반별 학생 현황</h3>
          <div class="hint">이번 주차: ${wk} (매주 리셋) · 이름을 클릭하면 상세 사유를 볼 수 있어요</div>
        </div>
        <div class="legend no-print">
          <div class="item"><span class="dot" style="background:var(--green)"></span>정상</div>
          <div class="item"><span class="dot" style="background:var(--amber)"></span>주의</div>
          <div class="item"><span class="dot" style="background:var(--red)"></span>위험</div>
          <div class="item"><span class="dot" style="background:var(--watch)"></span>관찰 필요</div>
        </div>
      </div>
      <div class="card-pad">
        <div class="toolbar no-print">
          <div class="chip-filter active" data-f="all" onclick="filterDashboard('all', this)">전체</div>
          <div class="chip-filter" data-f="red" onclick="filterDashboard('red', this)">위험만</div>
          <div class="chip-filter" data-f="yellow" onclick="filterDashboard('yellow', this)">주의만</div>
          <div class="chip-filter" data-f="watch" onclick="filterDashboard('watch', this)">관찰 필요만</div>
          <div class="chip-filter" data-f="green" onclick="filterDashboard('green', this)">정상만</div>
          <div style="flex:1"></div>
          <div class="search-input">
            <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <input placeholder="이름 검색" oninput="searchDashboard(this.value)" style="width:180px;">
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>등급</th><th>이름</th><th>반</th><th>학교/학년</th><th>이번 주 이슈</th><th>관찰</th><th></th></tr></thead>
            <tbody id="dash-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  `;
  window._dashGrades = grades.sort((a,b)=> rowOrder(a.g,a.w)-rowOrder(b.g,b.w) || a.s.className.localeCompare(b.s.className));
  window._dashFilter = 'all';
  window._dashSearch = '';
  drawDashboardTable();
}
function rowOrder(g,w){
  if(g.hasAnyRecord && g.grade==='red') return 0;
  if(g.hasAnyRecord && g.grade==='yellow') return 1;
  if(w.watch) return 1.5;
  if(!g.hasAnyRecord) return 3;
  return 2;
}

function filterDashboard(f, el){
  window._dashFilter = f;
  document.querySelectorAll('.chip-filter').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  drawDashboardTable();
}
function searchDashboard(v){ window._dashSearch = v.trim(); drawDashboardTable(); }

function drawDashboardTable(){
  const tbody = document.getElementById('dash-tbody');
  let rows = window._dashGrades;
  if(window._dashFilter==='watch') rows = rows.filter(r=>r.w.watch);
  else if(window._dashFilter!=='all') rows = rows.filter(r=> r.g.hasAnyRecord && r.g.grade===window._dashFilter);
  if(window._dashSearch) rows = rows.filter(r=> r.s.name.includes(window._dashSearch));

  if(rows.length===0){
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">해당하는 학생이 없어요</div></td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(({s,g,w})=>{
    const gr = g.hasAnyRecord ? g.grade : 'none';
    return `
    <tr>
      <td><div class="seal ${gradeSealClass(gr)}">${gradeSealChar(gr)}</div></td>
      <td><a href="javascript:void(0)" onclick="openStudentDetail('${s.id}')" style="font-weight:700; color:var(--text-strong); text-decoration:none;">${esc(s.name)}</a> ${s.notes? `<span title="${esc(s.notes)}" style="cursor:help;">📌</span>`:''}</td>
      <td><span class="badge badge-class">${classLabel(s.className)}</span></td>
      <td class="muted">${esc(s.school||'학교 미입력')} · ${esc(s.grade||'-')}</td>
      <td class="muted" style="max-width:280px;">${g.hasAnyRecord ? (g.detail.length? esc(g.detail.slice(0,2).join(', ')) + (g.detail.length>2? ` 외 ${g.detail.length-2}건`:'') : '이슈 없음') : '이번 주 입력 기록 없음'}</td>
      <td>${w.watch? `<span class="pill pill-watch" title="최근 ${w.windowWeeks}주 중 ${w.badCount}주 노랑·빨강">관찰 필요</span>` : ''}</td>
      <td><button class="btn btn-ghost btn-sm no-print" onclick="openStudentDetail('${s.id}')">상세</button></td>
    </tr>`;
  }).join('');
}

function openStudentDetail(id){
  const s = studentById(id);
  const wk = currentWeekKey();
  const g = computeWeeklyGrade(id, wk);
  const w = computeWatchFlag(id);
  // 최근 4주 흐름
  const weeks = [];
  for(let i=3;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-7*i);
    weeks.push(getWeekKey(fmtDate(d)));
  }
  const trend = weeks.map(wk2=>computeWeeklyGrade(id,wk2));

  openModal(`
    <div class="modal-head">
      <div class="flex gap-10"><div class="seal seal-lg ${gradeSealClass(g.hasAnyRecord?g.grade:'none')}">${gradeSealChar(g.hasAnyRecord?g.grade:'none')}</div>
        <div><h3>${esc(s.name)}</h3><div class="muted" style="font-size:12.5px;">${classLabel(s.className)} · ${esc(s.school||'학교 미입력')} ${esc(s.grade||'-')}</div></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      ${s.notes? `<div style="background:var(--brass-dim); border:1px solid rgba(156,122,60,0.3); border-radius:10px; padding:12px 14px; margin-bottom:14px;">
        <div style="font-size:11.5px; font-weight:700; color:var(--brass); text-transform:uppercase; letter-spacing:.4px; margin-bottom:5px;">📌 특이사항</div>
        <div style="font-size:13.5px; color:var(--text-strong); white-space:pre-wrap; line-height:1.6;">${esc(s.notes)}</div>
      </div>` : ''}
      ${w.watch? `<div class="pill pill-watch" style="margin-bottom:14px; display:inline-block;">관찰 필요 · 최근 ${w.windowWeeks}주 중 ${w.badCount}주 노랑·빨강</div>` : ''}
      <div style="font-size:12.5px; font-weight:700; color:var(--text-soft); text-transform:uppercase; letter-spacing:.4px; margin-bottom:10px;">최근 4주 등급 흐름</div>
      <div class="seal-row" style="margin-bottom:20px;">
        ${trend.map(t=>`<div class="seal seal-sm ${gradeSealClass(t.hasAnyRecord?t.grade:'none')}" title="${t.weekKey}"></div><span class="muted" style="font-size:11px;">${t.weekKey.slice(6)}</span>`).join('<span style="width:8px"></span>')}
      </div>
      <div class="divider"></div>
      <div style="font-size:12.5px; font-weight:700; color:var(--text-soft); text-transform:uppercase; letter-spacing:.4px; margin-bottom:10px;">이번 주 (${wk}) 사유</div>
      ${g.detail.length? `<ul style="margin:0; padding-left:18px; font-size:13.5px; line-height:1.9;">${g.detail.map(d=>`<li>${esc(d)}</li>`).join('')}</ul>` : `<div class="muted" style="font-size:13.5px;">${g.hasAnyRecord?'특별한 이슈가 없습니다.':'이번 주 입력된 기록이 아직 없습니다.'}</div>`}
      <div class="divider"></div>
      <div class="flex gap-10 wrap">
        <div class="pill pill-mute">학부모 연락처 ${esc(s.parentPhone||'-')}</div>
        <div class="pill pill-mute">등록일 ${esc(s.registeredAt||'-')}</div>
        ${s.attendanceNo? `<div class="pill pill-mute">출결번호 ${esc(s.attendanceNo)}</div>` : ''}
        ${s.address? `<div class="pill pill-mute">거주지 ${esc(s.address)}</div>` : ''}

function filterStudentsTable(){
  const q = (document.getElementById('stu-search').value||'').trim();
  const cls = document.getElementById('stu-class-filter').value;
  const statusFilter = document.getElementById('stu-status-filter').value;
  let rows = DB.students.filter(s=> (!q || s.name.includes(q) || s.school.includes(q)) && (!cls || s.className===cls) && (!statusFilter || (s.status||'재원')===statusFilter));
  rows = rows.sort((a,b)=> a.className.localeCompare(b.className) || a.name.localeCompare(b.name));
  const tbody = document.getElementById('stu-tbody');
  const canEdit = window._canEditStudents;
  if(rows.length===0){ tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state">검색 결과가 없어요</div></td></tr>`; return; }
  tbody.innerHTML = rows.map(s=>{
    const historyCount = DB.classHistory.filter(h=>h.studentId===s.id).length;
    const household = householdOf(s.id).filter(x=>x.id!==s.id);
    const status = s.status || '재원';
    const meta = STATUS_META[status] || STATUS_META['재원'];
    return `
    <tr ${status!=='재원'? 'style="opacity:.6;"':''}>
      <td style="font-weight:700; color:var(--text-strong);">${esc(s.name)} ${s.notes? `<span title="${esc(s.notes)}" style="cursor:help;">📌</span>`:''}</td>
      <td><span class="pill ${meta.pill}" style="cursor:${canEdit?'pointer':'default'};" ${canEdit?`onclick="openStatusChange('${s.id}')" title="클릭해서 상태 변경"`:''}>${status}</span></td>
      <td><span class="badge badge-class">${classLabel(s.className)}</span> ${historyCount? `<button class="btn btn-ghost btn-sm" style="padding:2px 8px; margin-left:4px;" title="반 이동 이력 보기" onclick="openClassHistory('${s.id}')">이동${historyCount}회</button>`:''}</td>
      <td class="muted">${esc(s.school||'-')}</td>
      <td class="muted">${esc(s.grade||'-')}</td>
      <td class="muted">${esc(s.parentPhone||'-')} ${household.length? `<span class="pill pill-watch" style="margin-left:4px; cursor:help;" title="형제·자매: ${esc(household.map(h=>h.name+'('+h.className+'반)').join(', '))}">형제 ${household.length}</span>`:''}</td>
      <td class="muted">${esc(s.registeredAt||'-')}</td>
      <td class="muted" style="font-size:12px;">${CLASS_EXAMS[s.className].map(e=>EXAM_META[e].name).join(', ')}</td>
      ${canEdit? `<td><div class="flex gap-8">
          <button class="btn btn-ghost btn-sm" onclick="openStudentForm('${s.id}')">수정</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--red);" onclick="deleteStudent('${s.id}')">완전삭제</button>
        </div></td>`:''}
    </tr>`;
  }).join('');
}

async function saveStudent(id){
  const name = document.getElementById('f-name').value.trim();
  if(!name){ toast('이름을 입력해주세요', true); return; }
  const gradeVal = document.getElementById('f-grade').value.trim();
  const newClass = document.getElementById('f-class').value;
  const data = {
    name,
    className: newClass,
    school: document.getElementById('f-school').value.trim(),
    grade: gradeVal,
    parentPhone: document.getElementById('f-phone').value.trim(),
    attendanceNo: document.getElementById('f-attnum').value.trim(),
    registeredAt: document.getElementById('f-reg').value,
    referralSource: document.getElementById('f-referral').value.trim(),
    address: document.getElementById('f-address').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
  };
  let classChangedMsg = null;
  if(id){
    const s = studentById(id);
    const oldClass = s.className;
    if(oldClass !== newClass){
      const moveDateEl = document.getElementById('f-move-date');
      const movedAt = moveDateEl ? moveDateEl.value : fmtDate(new Date());
      DB.classHistory.push({
        id: uid('mv'), studentId: id, fromClass: oldClass, toClass: newClass,
        changedAt: movedAt, teacher: currentTeacherLabel(),
      });
      classChangedMsg = `${oldClass}반 → ${newClass}반으로 이동 기록을 남겼어요`;
    }
    Object.assign(s, data);
  } else {
    DB.students.push(Object.assign({id:uid('stu'), studentPhone:'', status:'재원', statusNote:'', statusChangedAt:''}, data));
  }
  const ok = await saveDB();
  closeModal();
  if(ok) toast(classChangedMsg || '저장했어요');
  renderStudents(document.getElementById('view-inner'));
}

async function deleteStudent(id){
  if(!confirm('정말 완전 삭제할까요?\n\n시험·숙제 기록까지 전부 사라지며 되돌릴 수 없습니다.\n단순히 그만 다니는 학생이라면 취소하고 "상태" 배지를 눌러 휴원/퇴원으로 처리하는 걸 추천해요 — 그러면 기록이 보존됩니다.')) return;
  DB.students = DB.students.filter(s=>s.id!==id);
  DB.examRecords = DB.examRecords.filter(r=>r.studentId!==id);
  DB.homeworkRecords = DB.homeworkRecords.filter(r=>r.studentId!==id);
  DB.classHistory = DB.classHistory.filter(h=>h.studentId!==id);
  DB.statusHistory = DB.statusHistory.filter(h=>h.studentId!==id);
  const ok = await saveDB();
  if(ok) toast('삭제했어요');
  renderStudents(document.getElementById('view-inner'));
}

async function confirmStatusChange(studentId){
  const s = studentById(studentId);
  const oldStatus = s.status || '재원';
  const newStatus = document.getElementById('status-new').value;
  const changedAt = document.getElementById('status-date').value;
  const note = document.getElementById('status-note').value.trim();
  if(oldStatus!==newStatus){
    DB.statusHistory.push({ id:uid('st'), studentId, fromStatus:oldStatus, toStatus:newStatus, changedAt, note, teacher: currentTeacherLabel() });
  }
  s.status = newStatus;
  s.statusNote = note;
  s.statusChangedAt = changedAt;
  const ok = await saveDB();
  closeModal();
  if(ok) toast(`${s.name} 학생을 '${newStatus}' 상태로 변경했어요`);
  renderStudents(document.getElementById('view-inner'));
}

function onExamClassChange(){
  const cls = document.getElementById('ei-class').value;
  const stuSel = document.getElementById('ei-student');
  const examSel = document.getElementById('ei-exam');
  if(!cls){ stuSel.innerHTML='<option value="">먼저 반을 선택하세요</option>'; examSel.innerHTML='<option value="">먼저 학생을 선택하세요</option>'; document.getElementById('ei-value-field').innerHTML=''; return; }
  const students = DB.students.filter(s=>s.className===cls && (s.status||'재원')==='재원');
  stuSel.innerHTML = students.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('') || '<option value="">학생 없음</option>';
  onExamStudentChange();
  stuSel.onchange = onExamStudentChange;
}
function onExamStudentChange(){
  const cls = document.getElementById('ei-class').value;
  const examSel = document.getElementById('ei-exam');
  examSel.innerHTML = CLASS_EXAMS[cls].map(ek=>`<option value="${ek}">${EXAM_META[ek].name} (${EXAM_META[ek].cycle})</option>`).join('');
  onExamTypeChange();
  examSel.onchange = onExamTypeChange;
}
function onExamTypeChange(){
  const ek = document.getElementById('ei-exam').value;
  const meta = EXAM_META[ek];
  const box = document.getElementById('ei-value-field');
  if(!meta){ box.innerHTML=''; return; }
  if(meta.type==='score'){
    box.innerHTML = `<div class="field"><label>점수 (기준 ${getExamThreshold(ek)}점)</label><input type="number" id="ei-score" min="0" max="100" placeholder="0~100" oninput="validateScoreInput(this)"></div>`;
  } else if(meta.type==='pass'){
    box.innerHTML = `<div class="field"><label>통과 여부</label>
      <div class="status-btns"><button type="button" class="status-btn" data-v="true" onclick="pickPass(this,true)">통과</button><button type="button" class="status-btn" data-v="false" onclick="pickPass(this,false)">미통과</button></div></div>`;
  } else if(meta.type==='level'){
    box.innerHTML = `<div class="field"><label>이번 진도 통과 여부</label>
      <div class="status-btns"><button type="button" class="status-btn" data-v="true" onclick="pickPass(this,true)">레벨 통과</button><button type="button" class="status-btn" data-v="false" onclick="pickPass(this,false)">미통과</button></div></div>`;
  }
}
function pickPass(el, val){
  el.parentElement.querySelectorAll('.status-btn').forEach(b=>b.classList.remove('sel-ok','sel-bad'));
  el.classList.add(val ? 'sel-ok':'sel-bad');
  el.parentElement.dataset.val = val;
}

function validateScoreInput(el){
  const v = Number(el.value);
  const invalid = el.value!=='' && (isNaN(v) || v<0 || v>100);
  el.style.borderColor = invalid ? 'var(--red)' : '';
  el.style.boxShadow = invalid ? '0 0 0 3px var(--red-bg)' : '';
}

async function addExamRecord(){
  const studentId = document.getElementById('ei-student').value;
  const examType = document.getElementById('ei-exam').value;
  const date = document.getElementById('ei-date').value;
  if(!studentId || !examType || !date){ toast('반/학생/시험/날짜를 모두 선택해주세요', true); return; }
  const meta = EXAM_META[examType];
  let score=null, passed=null;
  if(meta.type==='score'){
    const rawVal = document.getElementById('ei-score').value;
    if(rawVal===''){ toast('점수를 입력해주세요', true); return; }
    score = Number(rawVal);
    if(isNaN(score)){ toast('점수는 숫자로 입력해주세요', true); return; }
    if(score<0 || score>100){ toast('점수는 0~100 사이여야 해요. 다시 확인해주세요.', true); return; }
  } else {
    const btnsWrap = document.querySelector('#ei-value-field .status-btns');
    if(!btnsWrap.dataset.val){ toast('통과 여부를 선택해주세요', true); return; }
    passed = btnsWrap.dataset.val==='true';
  }
  DB.examRecords.unshift({ id:uid('exam'), studentId, examType, date, score, passed, teacher: currentTeacherLabel() });
  const ok = await saveDB();
  if(ok) toast('시험 기록을 저장했어요');
  drawExamTable();
}

function drawExamTable(){
  const tbody = document.getElementById('ei-tbody');
  const rows = DB.examRecords.slice(0,40);
  if(rows.length===0){ tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">아직 입력된 시험 기록이 없어요</div></td></tr>`; return; }
  tbody.innerHTML = rows.map(r=>{
    const s = studentById(r.studentId);
    if(!s) return '';
    const meta = EXAM_META[r.examType];
    const result = meta.type==='score' ? `${r.score}점` : (r.passed? '통과':'미통과');
    const pillClass = meta.type==='score' ? (r.score<getExamThreshold(r.examType)?'pill-bad':'pill-ok') : (r.passed?'pill-ok':'pill-bad');
    return `<tr>
      <td class="muted">${r.date}</td>
      <td style="font-weight:700;">${esc(s.name)}</td>
      <td><span class="badge badge-class">${classLabel(s.className)}</span></td>
      <td>${meta.name}</td>
      <td><span class="pill ${pillClass}">${result}</span></td>
      <td class="muted">${esc(r.teacher)}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="deleteExamRecord('${r.id}')">삭제</button></td>
    </tr>`;
  }).join('');
}
async function deleteExamRecord(id){
  DB.examRecords = DB.examRecords.filter(r=>r.id!==id);
  const ok = await saveDB();
  drawExamTable();
  if(ok) toast('삭제했어요');
}

function drawWritingTable(){
  const date = document.getElementById('hw-w-date').value;
  const cls = document.getElementById('hw-w-class').value;
  const onlyUnchecked = document.getElementById('hw-w-onlyunchecked').checked;
  let students = DB.students.filter(s=> (!cls || s.className===cls) && ((s.status||'재원')==='재원')).sort((a,b)=>a.className.localeCompare(b.className)||a.name.localeCompare(b.name));

  const holiday = holidayInfo(date);
  const banner = document.getElementById('hw-w-holiday-banner');
  banner.innerHTML = holiday
    ? `<div class="pill pill-mute" style="display:block; padding:10px 14px; margin-bottom:14px; font-size:13px;">📅 오늘은 휴무일이에요 — ${esc(holiday.label||'사유 없음')} · <button class="btn btn-ghost btn-sm" style="padding:2px 8px;" onclick="removeHoliday('${date}'); drawWritingTable();">휴무일 해제</button></div>`
    : `<div class="no-print" style="margin-bottom:14px;"><button class="btn btn-ghost btn-sm" onclick="quickAddHoliday('${date}', drawWritingTable)">📅 이 날을 휴무일로 등록</button></div>`;

  const counterEl = document.getElementById('hw-w-counter');
  if(holiday){
    counterEl.innerHTML = `<span class="pill pill-mute">휴무일 · 체크 불필요</span>`;
  } else {
    const uncheckedCount = students.filter(s=> !DB.homeworkRecords.find(r=>r.studentId===s.id && r.type==='writing' && r.date===date)).length;
    counterEl.innerHTML = uncheckedCount>0
      ? `<span class="pill pill-warn">미체크 ${uncheckedCount}명</span>`
      : `<span class="pill pill-ok">전원 체크 완료</span>`;
  }

  if(onlyUnchecked){
    students = students.filter(s=> !DB.homeworkRecords.find(r=>r.studentId===s.id && r.type==='writing' && r.date===date));
  }

  const tbody = document.getElementById('hw-w-tbody');
  tbody.innerHTML = students.map(s=>{
    const rec = DB.homeworkRecords.find(r=>r.studentId===s.id && r.type==='writing' && r.date===date);
    const cur = rec ? rec.status : null;
    const recent = rec && isRecent(rec.updatedAt, 10);
    return `<tr ${!rec?'style="background:#fbf7ec;"':''}>
      <td style="font-weight:700;">${esc(s.name)} ${s.notes?`<span title="${esc(s.notes)}" style="cursor:help;">📌</span>`:''} ${!rec?'<span class="pill pill-mute" style="margin-left:6px;">미체크</span>':''}</td>
      <td><span class="badge badge-class">${classLabel(s.className)}</span></td>
      <td><div class="status-btns">
        ${WRITING_STATUS.map(st=>{
          const cls2 = st==='제출완료'?'sel-ok':st==='현장보완'?'sel-warn':'sel-bad';
          return `<button class="status-btn ${cur===st?cls2:''}" onclick="setWritingStatus('${s.id}','${date}','${st}')">${st}</button>`;
        }).join('')}
      </div></td>
      <td class="muted" style="font-size:11.5px; white-space:nowrap;">${rec? `${recent?'<span style=\"color:var(--brass); font-weight:700;\">● </span>':''}${esc(rec.teacher||'')} · ${relativeTime(rec.updatedAt)}` : ''}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="4"><div class="empty-state">${onlyUnchecked? '미체크 학생이 없어요 🎉':'학생이 없어요'}</div></td></tr>`;
}

async function bulkMarkWriting(){
  const date = document.getElementById('hw-w-date').value;
  const cls = document.getElementById('hw-w-class').value;
  const students = DB.students.filter(s=> (!cls || s.className===cls) && (s.status||'재원')==='재원');
  const targets = students.filter(s=> !DB.homeworkRecords.find(r=>r.studentId===s.id && r.type==='writing' && r.date===date));
  if(targets.length===0){ toast('이미 전원 체크되어 있어요'); return; }
  if(!confirm(`${cls?cls+'반 ':'전체 반 '}미체크 학생 ${targets.length}명을 모두 '제출완료'로 처리할까요?\n이미 체크된 학생은 그대로 유지됩니다.`)) return;
  targets.forEach(s=>{
    DB.homeworkRecords.push({ id:uid('hw'), studentId:s.id, type:'writing', date, status:'제출완료', teacher: currentTeacherLabel(), updatedAt: new Date().toISOString() });
  });
  const ok = await saveDB();
  drawWritingTable();
  if(ok) toast(`${targets.length}명을 제출완료로 일괄 처리했어요`);
}

async function setWritingStatus(studentId, date, status){
  let rec = DB.homeworkRecords.find(r=>r.studentId===studentId && r.type==='writing' && r.date===date);
  const now = new Date().toISOString();
  if(rec){ rec.status = status; rec.teacher = currentTeacherLabel(); rec.updatedAt = now; }
  else { DB.homeworkRecords.push({ id:uid('hw'), studentId, type:'writing', date, status, teacher: currentTeacherLabel(), updatedAt: now }); }
  const ok = await saveDB();
  drawWritingTable();
  if(ok) toast('저장했어요');
}

async function confirmQuickHoliday(date){
  const label = document.getElementById('holiday-label-input').value.trim();
  const existing = DB.holidays.find(h=>h.date===date);
  if(existing) existing.label = label;
  else DB.holidays.push({date, label});
  const ok = await saveDB();
  closeModal();
  if(ok) toast('휴무일로 등록했어요');
  if(window._holidayRedraw) window._holidayRedraw();
}
async function removeHoliday(date){
  DB.holidays = DB.holidays.filter(h=>h.date!==date);

  toast('휴무일을 해제했어요');
}

async function removeHolidayFromSettings(date){

function videoSelectClass(status){
  if(!status) return 'vsel-none';
  if(status==='정상제출') return 'vsel-ok';
  if(status==='현장보완') return 'vsel-warn';
  return 'vsel-bad';
}

function drawVideoTable(){
  const date = document.getElementById('hw-v-date').value;
  const cls = document.getElementById('hw-v-class').value;
  const onlyUnchecked = document.getElementById('hw-v-onlyunchecked').checked;
  let students = DB.students.filter(s=> (!cls || s.className===cls) && ((s.status||'재원')==='재원')).sort((a,b)=>a.className.localeCompare(b.className)||a.name.localeCompare(b.name));

  const holiday = holidayInfo(date);
  const banner = document.getElementById('hw-v-holiday-banner');
  banner.innerHTML = holiday
    ? `<div class="pill pill-mute" style="display:block; padding:10px 14px; margin-bottom:14px; font-size:13px;">📅 오늘은 휴무일이에요 — ${esc(holiday.label||'사유 없음')} · <button class="btn btn-ghost btn-sm" style="padding:2px 8px;" onclick="removeHoliday('${date}'); drawVideoTable();">휴무일 해제</button></div>`
    : `<div class="no-print" style="margin-bottom:14px;"><button class="btn btn-ghost btn-sm" onclick="quickAddHoliday('${date}', drawVideoTable)">📅 이 날을 휴무일로 등록</button></div>`;

  // 챕터별 헤더 (미체크 인원 표시)
  const theadEl = document.getElementById('hw-v-thead-chapters');
  theadEl.innerHTML = VIDEO_TYPES.map(v=>{
    const unchecked = students.filter(s=> !DB.homeworkRecords.find(r=>r.studentId===s.id && r.type===v.key && r.date===date)).length;
    return `<th style="text-align:center;"><div class="video-chapter-head"><span>${v.name}</span><span class="cnt ${unchecked===0 && students.length>0?'done':''}">${students.length===0?'':(unchecked===0?'완료':unchecked+'명 미체크')}</span></div></th>`;
  }).join('');

  const recordOf = (studentId, type)=> DB.homeworkRecords.find(r=>r.studentId===studentId && r.type===type && r.date===date);
  const missingCountFor = (s)=> VIDEO_TYPES.filter(v=>!recordOf(s.id, v.key)).length;

  const counterEl = document.getElementById('hw-v-counter');
  if(holiday){
    counterEl.innerHTML = `<span class="pill pill-mute">휴무일 · 체크 불필요</span>`;
  } else {
    const studentsWithMissing = students.filter(s=>missingCountFor(s)>0).length;
    counterEl.innerHTML = students.length===0 ? '' : (studentsWithMissing>0
      ? `<span class="pill pill-warn">미체크 항목 남은 학생 ${studentsWithMissing}명</span>`
      : `<span class="pill pill-ok">전원 5개 챕터 체크 완료</span>`);
  }

  if(onlyUnchecked){
    students = students.filter(s=>missingCountFor(s)>0);
  }

  const tbody = document.getElementById('hw-v-tbody');
  tbody.innerHTML = students.map(s=>{
    const missing = missingCountFor(s);
    return `<tr ${missing>0?'style="background:#fbf7ec;"':''}>
      <td style="font-weight:700; white-space:nowrap;">${esc(s.name)} ${s.notes?`<span title="${esc(s.notes)}" style="cursor:help;">📌</span>`:''} ${missing>0?`<span class="pill pill-mute" style="margin-left:6px;">미체크 ${missing}</span>`:''}</td>
      <td><span class="badge badge-class">${classLabel(s.className)}</span></td>
      ${VIDEO_TYPES.map(v=>{
        const rec = recordOf(s.id, v.key);
        const cur = rec ? rec.status : '';
        const title = rec ? `${esc(rec.teacher||'')} · ${relativeTime(rec.updatedAt)}` : '아직 체크 안 함';
        return `<td class="vsel-cell">
          <select class="vsel ${videoSelectClass(cur)}" title="${title}" onchange="setVideoStatus('${s.id}','${date}','${v.key}',this.value)">
            <option value="" ${!cur?'selected':''}>미체크</option>
            ${VIDEO_STATUS.map(st=>`<option value="${st}" ${cur===st?'selected':''}>${st}</option>`).join('')}
          </select>
        </td>`;
      }).join('')}
    </tr>`;
  }).join('') || `<tr><td colspan="${2+VIDEO_TYPES.length}"><div class="empty-state">${onlyUnchecked? '미체크 학생이 없어요 🎉':'학생이 없어요'}</div></td></tr>`;

  // 비고는 반 단위로 남기는 메모라, 반을 선택했을 때만 활성화됩니다
  const weekKey = getWeekKey(date);
  const noteBox = document.getElementById('hw-v-note');
  const scopeLabel = document.getElementById('hw-v-note-scope');
  if(!cls){
    noteBox.value=''; noteBox.disabled = true; noteBox.placeholder='특정 반을 선택하면 그 반의 비고를 남길 수 있어요';
    scopeLabel.textContent = '반을 선택해주세요';
    noteBox.dataset.key='';
  } else {
    noteBox.disabled = false;
    noteBox.placeholder = '예: 서율 - 알파영상 2개 중 1개만 업로드. 하윤 - 영상숙제 중 딴짓, 집중 못함.';
    const key = cls+'::'+weekKey;
    noteBox.value = DB.videoNotes[key] || '';
    noteBox.dataset.key = key;
    scopeLabel.textContent = `${classLabel(cls)} · ${weekKey} 비고`;
  }
}

async function setVideoStatus(studentId, date, type, status){
  if(!status){
    // "미체크"를 다시 선택하면 체크를 취소합니다
    DB.homeworkRecords = DB.homeworkRecords.filter(r=> !(r.studentId===studentId && r.type===type && r.date===date));
  } else {
    let rec = DB.homeworkRecords.find(r=>r.studentId===studentId && r.type===type && r.date===date);
    const now = new Date().toISOString();
    if(rec){ rec.status = status; rec.teacher = currentTeacherLabel(); rec.updatedAt = now; }
    else { DB.homeworkRecords.push({ id:uid('hw'), studentId, type, date, status, teacher: currentTeacherLabel(), updatedAt: now }); }
  }
  const ok = await saveDB();
  drawVideoTable();
  if(ok) toast('저장했어요');
}

async function bulkMarkVideo(){
  const date = document.getElementById('hw-v-date').value;
  const cls = document.getElementById('hw-v-class').value;
  const students = DB.students.filter(s=> (!cls || s.className===cls) && ((s.status||'재원')==='재원'));
  const targets = [];
  students.forEach(s=>{
    VIDEO_TYPES.forEach(v=>{
      if(!DB.homeworkRecords.find(r=>r.studentId===s.id && r.type===v.key && r.date===date)){
        targets.push({studentId:s.id, type:v.key});
      }
    });
  });
  if(targets.length===0){ toast('이미 전원 5개 챕터가 체크되어 있어요'); return; }
  if(!confirm(`${cls?cls+'반 ':'전체 반 '}미체크 챕터 ${targets.length}건(학생×챕터)을 모두 '정상제출'로 처리할까요?\n이미 체크된 항목은 그대로 유지됩니다.`)) return;
  const now = new Date().toISOString();
  targets.forEach(t=>{
    DB.homeworkRecords.push({ id:uid('hw'), studentId:t.studentId, type:t.type, date, status:'정상제출', teacher: currentTeacherLabel(), updatedAt: now });
  });
  const ok = await saveDB();
  drawVideoTable();
  if(ok) toast(`${targets.length}건을 정상제출로 일괄 처리했어요`);
}

function openBulkSms(){
  const checked = Array.from(document.querySelectorAll('.rem-check:checked')).map(c=>c.value);
  if(checked.length===0){ toast('문자를 보낼 학생을 먼저 선택해주세요', true); return; }
  const wk = currentWeekKey();

  // 학부모 연락처가 같은 학생끼리 한 그룹(한 가구)으로 묶어서 문자를 한 통만 보냅니다
  const groups = {};
  checked.forEach(id=>{
    const s = studentById(id);
    const norm = normalizePhone(s.parentPhone);
    const key = norm || ('solo_'+id);
    if(!groups[key]) groups[key] = [];
    groups[key].push(id);
  });
  const groupList = Object.values(groups);
  const siblingGroupCount = groupList.filter(g=>g.length>1).length;

  const msgs = groupList.map(ids=>{
    const names = ids.map(id=>studentById(id).name);
    const lines = ids.map(id=>{
      const s = studentById(id);
      const g = computeWeeklyGrade(id, wk);
      return `· ${s.name}: ${g.detail.join(', ') || '위험군 안내'}`;
    });
    const body = `[남쌤 ERC 학원] ${names.join('·')} 학생 이번 주 안내\n${lines.join('\n')}\n가정에서 지도 부탁드립니다.`;
    return {ids, names, body};
  });

  openModal(`
    <div class="modal-head"><h3>학부모 문자 발송 확인</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="muted" style="font-size:12.5px; margin-bottom:14px;">발송 전 내용을 확인·수정할 수 있어요. (데모 환경에서는 실제 SMS 게이트웨이 연동 없이 발송 기록만 저장됩니다)</div>
      ${siblingGroupCount>0? `<div class="pill pill-watch" style="margin-bottom:14px; display:inline-block;">형제·자매 ${siblingGroupCount}가구는 문자 한 통으로 묶어서 발송돼요</div>` : ''}
      ${msgs.map((m,i)=>`
        <div class="field">
          <label>${esc(m.names.join(' · '))} 학부모 ${m.ids.length>1?'<span class="pill pill-mute" style="margin-left:4px;">형제 묶음</span>':''}</label>
          <textarea rows="${2+m.ids.length}" id="sms-${i}">${esc(m.body)}</textarea>
        </div>
      `).join('')}
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-brass" onclick='confirmBulkSms(${JSON.stringify(groupList)})'>발송하기</button>
    </div>
  `);
}
async function confirmBulkSms(groupList){
  const wk = currentWeekKey();
  let totalStudents = 0;
  groupList.forEach((ids,i)=>{
    const textEl = document.getElementById('sms-'+i);
    const message = textEl ? textEl.value : '';
    ids.forEach(id=>{
      const key = id+'::'+wk;
      DB.remedial[key] = Object.assign({}, DB.remedial[key], {sent:true, message, sentAt: fmtDate(new Date())});
      totalStudents++;
    });
  });
  const ok = await saveDB();
  closeModal();
  if(ok) toast(`${groupList.length}건 문자 발송 (${totalStudents}명 대상)`);
  renderRemedial(document.getElementById('view-inner'));
}

function monthlySummary(studentId, monthKey){
  const exams = DB.examRecords.filter(r=>r.studentId===studentId && getMonthKey(r.date)===monthKey);
  const hws = DB.homeworkRecords.filter(r=>r.studentId===studentId && getMonthKey(r.date)===monthKey);
  const examByType = {};
  exams.forEach(r=>{
    if(!examByType[r.examType]) examByType[r.examType]=[];
    examByType[r.examType].push(r);
  });
  const writing = hws.filter(r=>r.type==='writing');
  const wCount = {제출완료:0, 현장보완:0, 미제출:0};
  writing.forEach(r=>wCount[r.status] = (wCount[r.status]||0)+1);
  const video = hws.filter(r=>r.type.startsWith('video_'));
  const vNormal = video.filter(r=>r.status==='정상제출').length;
  const vIssue = video.length - vNormal;
  // 최근 4주 등급
  const weeks=[]; for(let i=3;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-7*i); weeks.push(getWeekKey(fmtDate(d))); }
  const trend = weeks.map(w=>computeWeeklyGrade(studentId,w));
  return {examByType, wCount, video:{total:video.length, normal:vNormal, issue:vIssue}, trend};
}

/* ---------------------- 14-2. 학기·분기 리포트 (긴 기간 통계 · 반별 비교) ---------------------- */

// start~end(YYYY-MM-DD, 포함) 사이에 걸치는 모든 주차(weekKey) 목록을 반환
function weeksBetween(start, end){
  const weeks = [];
  const seen = new Set();
  let d = new Date(start);
  const endDate = new Date(end);
  while(d<=endDate){
    const wk = getWeekKey(fmtDate(d));
    if(!seen.has(wk)){ seen.add(wk); weeks.push(wk); }
    d.setDate(d.getDate()+1);
  }
  return weeks;
}

function computeTermStats(start, end){
  const weeks = weeksBetween(start, end);
  const students = DB.students.filter(s=>(s.status||'재원')==='재원');

  // 반별 집계 초기화
  const byClass = {};
  CLASSES.forEach(c=> byClass[c] = { className:c, studentCount:0, redWeeks:0, yellowWeeks:0, greenWeeks:0, totalWeeks:0, scoreSum:0, scoreCount:0, writingOk:0, writingTotal:0, videoOk:0, videoTotal:0 });

  students.forEach(s=>{
    byClass[s.className].studentCount++;
    weeks.forEach(wk=>{
      const g = computeWeeklyGrade(s.id, wk);
      if(!g.hasAnyRecord) return;
      byClass[s.className].totalWeeks++;
      if(g.grade==='red') byClass[s.className].redWeeks++;
      else if(g.grade==='yellow') byClass[s.className].yellowWeeks++;
      else byClass[s.className].greenWeeks++;
    });
  });

  // 기간 내 시험 점수 평균 (반별)
  DB.examRecords.filter(r=> r.date>=start && r.date<=end && r.score!=null).forEach(r=>{
    const s = studentById(r.studentId); if(!s) return;
    byClass[s.className].scoreSum += r.score;
    byClass[s.className].scoreCount++;
  });

  // 기간 내 숙제 제출 현황 (반별)
  DB.homeworkRecords.filter(r=> r.date>=start && r.date<=end).forEach(r=>{
    const s = studentById(r.studentId); if(!s) return;
    if(r.type==='writing'){
      byClass[s.className].writingTotal++;
      if(r.status==='제출완료') byClass[s.className].writingOk++;
    } else if(r.type.startsWith('video_')){
      byClass[s.className].videoTotal++;
      if(r.status==='정상제출') byClass[s.className].videoOk++;
    }
  });

  const classRows = CLASSES.map(c=>{
    const b = byClass[c];
    const riskRate = b.totalWeeks>0 ? Math.round((b.redWeeks+b.yellowWeeks*0.5)/b.totalWeeks*100) : null;
    const avgScore = b.scoreCount>0 ? Math.round(b.scoreSum/b.scoreCount*10)/10 : null;
    const writingRate = b.writingTotal>0 ? Math.round(b.writingOk/b.writingTotal*100) : null;
    const videoRate = b.videoTotal>0 ? Math.round(b.videoOk/b.videoTotal*100) : null;
    return Object.assign({}, b, {riskRate, avgScore, writingRate, videoRate});
  }).filter(r=>r.studentCount>0);

  // 전체 요약
  const totalWeeksAll = classRows.reduce((a,r)=>a+r.totalWeeks,0);
  const totalRedAll = classRows.reduce((a,r)=>a+r.redWeeks,0);
  const totalYellowAll = classRows.reduce((a,r)=>a+r.yellowWeeks,0);
  const overallRiskRate = totalWeeksAll>0 ? Math.round((totalRedAll+totalYellowAll*0.5)/totalWeeksAll*100) : 0;
  const scoreAllSum = classRows.reduce((a,r)=>a+(r.scoreCount? r.avgScore*r.scoreCount:0),0);
  const scoreAllCount = classRows.reduce((a,r)=>a+r.scoreCount,0);
  const overallAvgScore = scoreAllCount>0 ? Math.round(scoreAllSum/scoreAllCount*10)/10 : null;

  // 주차별 추이 (전체 학생 합산)
  const weeklyTrend = weeks.map(wk=>{
    let g=0,y=0,r=0;
    students.forEach(s=>{
      const grade = computeWeeklyGrade(s.id, wk);
      if(!grade.hasAnyRecord) return;
      if(grade.grade==='red') r++; else if(grade.grade==='yellow') y++; else g++;
    });
    return {weekKey:wk, green:g, yellow:y, red:r, total:g+y+r};
  });

  return { weeks, classRows, overallRiskRate, overallAvgScore, studentCount: students.length, weeklyTrend };
}

  const today = fmtDate(new Date());
  const threeMonthsAgo = fmtDate(new Date(Date.now()-90*86400000));
  root.innerHTML = `

function setTermPreset(p, el){
  document.querySelectorAll('#content-root .chip-filter').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  const end = fmtDate(new Date());
  let start;
  if(p==='3m') start = fmtDate(new Date(Date.now()-90*86400000));
  else if(p==='6m') start = fmtDate(new Date(Date.now()-180*86400000));
  else { // 전체: 가장 오래된 기록 날짜부터
    const allDates = [...DB.examRecords.map(r=>r.date), ...DB.homeworkRecords.map(r=>r.date)].filter(Boolean).sort();
    start = allDates.length? allDates[0] : end;
  }
  document.getElementById('term-start').value = start;
  document.getElementById('term-end').value = end;
  drawTermReport();
}

function drawTermReport(){
  const start = document.getElementById('term-start').value;
  const end = document.getElementById('term-end').value;
  const area = document.getElementById('term-area');
  if(!start || !end || start>end){
    area.innerHTML = `<div class="card"><div class="card-pad"><div class="empty-state">시작일이 종료일보다 늦어요. 날짜를 다시 확인해주세요.</div></div></div>`;
    return;
  }
  const stats = computeTermStats(start, end);

  if(stats.weeks.length===0 || stats.classRows.every(r=>r.totalWeeks===0)){
    area.innerHTML = `<div class="card"><div class="card-pad"><div class="empty-state">이 기간에는 아직 쌓인 데이터가 없어요. 데이터가 몇 주 이상 쌓이면 의미 있는 비교가 가능해요.</div></div></div>`;
    return;
  }

  const maxRisk = Math.max(...stats.classRows.map(r=>r.riskRate||0), 1);
  const sortedByRisk = stats.classRows.slice().sort((a,b)=> (b.riskRate||0)-(a.riskRate||0));
  const maxTrend = Math.max(...stats.weeklyTrend.map(t=>t.total), 1);

  area.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-bar ink"></div><div class="stat-label">분석 기간</div><div class="stat-num" style="font-size:16px;">${start.slice(5)} ~ ${end.slice(5)}</div><div class="stat-sub">${stats.weeks.length}주 · 재원 ${stats.studentCount}명</div></div>
      <div class="stat-card"><div class="stat-bar red"></div><div class="stat-label">전체 위험도 지수</div><div class="stat-num">${stats.overallRiskRate}%</div><div class="stat-sub">빨강 100% + 노랑 50% 가중 평균</div></div>
      <div class="stat-card"><div class="stat-bar amber"></div><div class="stat-label">기간 내 시험 평균</div><div class="stat-num">${stats.overallAvgScore!=null? stats.overallAvgScore+'점':'-'}</div><div class="stat-sub">점수형 시험 전체 평균</div></div>
      <div class="stat-card"><div class="stat-bar green"></div><div class="stat-label">최다 관찰 반</div><div class="stat-num" style="font-size:22px;">${sortedByRisk[0]? sortedByRisk[0].className+'반' : '-'}</div><div class="stat-sub">${sortedByRisk[0]? '위험도 '+sortedByRisk[0].riskRate+'%':''}</div></div>
    </div>

    <div class="card" style="margin-bottom:20px;">
      <div class="card-header">
        <div><h3>반별 비교</h3><div class="hint">위험도가 높은 순으로 정렬했어요 — 특정 반이 유독 높다면 커리큘럼·조교 배치를 점검해볼 만해요</div></div>
      </div>
      <div class="card-pad">
        <div class="table-wrap">
          <table>
            <thead><tr><th>반</th><th>인원</th><th style="min-width:160px;">위험도</th><th>시험 평균</th><th>쓰기숙제 제출률</th><th>영상숙제 정상률</th></tr></thead>
            <tbody>
              ${sortedByRisk.map(r=>`
                <tr>
                  <td><span class="badge badge-class">${classLabel(r.className)}</span></td>
                  <td class="muted">${r.studentCount}명</td>
                  <td>
                    <div class="flex gap-8">
                      <div style="flex:1; background:#efece3; border-radius:6px; height:8px; overflow:hidden;">
                        <div style="width:${maxRisk? (r.riskRate||0)/maxRisk*100:0}%; height:100%; background:${(r.riskRate||0)>=50?'var(--red)':(r.riskRate||0)>=25?'var(--amber)':'var(--green)'};"></div>
                      </div>
                      <span class="mono" style="font-size:12px; width:38px; text-align:right;">${r.riskRate!=null? r.riskRate+'%':'-'}</span>
                    </div>
                  </td>
                  <td class="muted">${r.avgScore!=null? r.avgScore+'점':'-'}</td>
                  <td class="muted">${r.writingRate!=null? r.writingRate+'%':'-'}</td>
                  <td class="muted">${r.videoRate!=null? r.videoRate+'%':'-'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h3>주차별 위험군 추이</h3><div class="hint">전체 학생 기준, 매주 정상(초록)·주의(노랑)·위험(빨강) 인원 변화</div></div>
      <div class="card-pad">
        <div style="display:flex; align-items:flex-end; gap:4px; height:160px; overflow-x:auto; padding-bottom:6px;">
          ${stats.weeklyTrend.map(t=>{
            const h = maxTrend? (t.total/maxTrend*130) : 0;
            const gH = t.total? t.green/t.total*h : 0;
            const yH = t.total? t.yellow/t.total*h : 0;
            const rH = t.total? t.red/t.total*h : 0;
            return `<div style="display:flex; flex-direction:column; align-items:center; gap:4px; flex-shrink:0; width:26px;" title="${t.weekKey}: 정상 ${t.green}·주의 ${t.yellow}·위험 ${t.red}">
              <div style="display:flex; flex-direction:column-reverse; width:16px; height:130px; justify-content:flex-start;">
                <div style="height:${gH}px; background:var(--green); width:100%;"></div>
                <div style="height:${yH}px; background:var(--amber); width:100%;"></div>
                <div style="height:${rH}px; background:var(--red); width:100%;"></div>
              </div>
              <div class="muted" style="font-size:9.5px; writing-mode:vertical-rl; text-orientation:mixed;">${t.weekKey.slice(6)}</div>
            </div>`;
          }).join('')}
        </div>
        <div class="legend" style="margin-top:10px;">
          <div class="item"><span class="dot" style="background:var(--green)"></span>정상</div>
          <div class="item"><span class="dot" style="background:var(--amber)"></span>주의</div>
          <div class="item"><span class="dot" style="background:var(--red)"></span>위험</div>
        </div>
      </div>
    </div>
  `;
}
