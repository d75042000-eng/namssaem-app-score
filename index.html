function exportExcelCSV(){
  const wk = currentWeekKey();
  const GRADE_LABEL = {green:'정상', yellow:'주의', red:'위험'};
  const rows = [["이름","반","상태","학교","학년","등록일","퇴원일","유입경로","형제자매(Y/N)","위험등급","관찰필요(Y/N)"]];
  DB.students.forEach(s=>{
    const status = s.status || '재원';
    let withdrawnAt = '';
    if(status==='퇴원'){
      const hist = (DB.statusHistory||[]).filter(h=>h.studentId===s.id && h.toStatus==='퇴원').sort((a,b)=>(b.changedAt||'').localeCompare(a.changedAt||''));
      if(hist.length) withdrawnAt = (hist[0].changedAt||'').slice(0,10);
    }
    const hasSibling = householdOf(s.id).filter(x=>x.id!==s.id).length>0 ? 'Y' : 'N';
    let riskLabel = '기록없음';
    if(status==='재원'){
      const g = computeWeeklyGrade(s.id, wk);
      riskLabel = g.hasAnyRecord ? (GRADE_LABEL[g.grade]||'기록없음') : '기록없음';
    }
    const watchYN = status==='재원' && computeWatchFlag(s.id).watch ? 'Y' : 'N';
    rows.push([
      s.name, classCode(s.className), status, s.school||'', s.grade||'',
      s.registeredAt||'', withdrawnAt, s.referralSource||'', hasSibling, riskLabel, watchYN
    ]);
  });
  const csv = rows.map(r=> r.map(v=>{
    const str = String(v===undefined||v===null? '' : v);
    return /[",\n]/.test(str) ? '"'+str.replace(/"/g,'""')+'"' : str;
  }).join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `남쌤ERC_엑셀용데이터_${fmtDate(new Date())}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  toast('엑셀용 CSV를 다운로드했어요');
}

function loadExcelJS(){
  return new Promise((resolve, reject)=>{
    if(window.ExcelJS){ resolve(); return; }
    const existing = document.getElementById('exceljs-cdn');
    if(existing){ existing.addEventListener('load', ()=>resolve()); existing.addEventListener('error', ()=>reject(new Error('load fail'))); return; }
    const s = document.createElement('script');
    s.id = 'exceljs-cdn';
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js';
    s.onload = ()=>resolve();
    s.onerror = ()=>reject(new Error('ExcelJS 로드 실패'));
    document.head.appendChild(s);
  });
}

// 숫자 크기를 텍스트 막대로 표현 (브라우저에서 직접 만드는 파일이라 진짜 차트 객체 대신 사용)
function textBar(value, max, width){
  width = width || 20;
  const filled = max > 0 ? Math.round((value / max) * width) : 0;
  return '■'.repeat(Math.max(0, Math.min(width, filled))) + '□'.repeat(Math.max(0, width - filled));
}

async function exportExcelDashboard(){
  const btn = document.getElementById('btn-excel-dash');
  if(btn) btn.disabled = true;
  toast('엑셀 파일을 만들고 있어요...');
  try{
    await loadExcelJS();

    const NAVY = 'FF1F4E78', BRASS = 'FF9C7A3C', CREAM = 'FFF4F1E9', INK = 'FF1F2933', SOFT = 'FF6B7280';
    const now = new Date();
    const thisMonth = fmtDate(now).slice(0,7);
    const active = DB.students.filter(s=>(s.status||'재원')==='재원');
    const totalActive = active.length;
    const newThisMonth = DB.students.filter(s=>(s.registeredAt||'').slice(0,7)===thisMonth).length;
    const withdrawnThisMonth = (DB.statusHistory||[]).filter(h=>h.toStatus==='퇴원' && (h.changedAt||'').slice(0,7)===thisMonth).length;

    const wk = currentWeekKey();
    let riskCount = 0, watchCount = 0;
    active.forEach(s=>{
      const g = computeWeeklyGrade(s.id, wk);
      const w = computeWatchFlag(s.id);
      if(g.hasAnyRecord && g.grade==='red') riskCount++;
      if(w.watch) watchCount++;
    });

    const classCounts = CLASSES.map(c=>({ label: classCode(c), n: active.filter(s=>s.className===c).length }));
    const maxClassCount = Math.max(1, ...classCounts.map(x=>x.n));

    const schoolMap = {};
    active.forEach(s=>{ const sc = (s.school||'').trim() || '학교 미입력'; schoolMap[sc]=(schoolMap[sc]||0)+1; });
    const schoolList = Object.entries(schoolMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const maxSchool = Math.max(1, ...schoolList.map(x=>x[1]));

    const chanMap = {};
    active.forEach(s=>{ const rs=(s.referralSource||'').trim(); if(rs) chanMap[rs]=(chanMap[rs]||0)+1; });
    const chanEntered = Object.values(chanMap).reduce((a,b)=>a+b,0);
    const chanList = Object.entries(chanMap).sort((a,b)=>b[1]-a[1]);
    const chanUnknown = totalActive - chanEntered;
    const maxChan = Math.max(1, ...chanList.map(x=>x[1]), chanUnknown);

    let siblingCount = 0;
    active.forEach(s=>{ if(householdOf(s.id).filter(x=>x.id!==s.id).length) siblingCount++; });
    const siblingPct = totalActive ? Math.round(siblingCount/totalActive*100) : 0;

    const withReg = active.filter(s=>s.registeredAt);
    let avgMonths = null;
    if(withReg.length){
      const total = withReg.reduce((sum,s)=>{
        const reg = new Date(s.registeredAt);
        const m = (now.getFullYear()-reg.getFullYear())*12 + (now.getMonth()-reg.getMonth());
        return sum + Math.max(0,m);
      },0);
      avgMonths = Math.round((total/withReg.length)*10)/10;
    }

    const withdrawals = (DB.statusHistory||[]).filter(h=>h.toStatus==='퇴원')
      .sort((a,b)=>(b.changedAt||'').localeCompare(a.changedAt||'')).slice(0,8)
      .map(h=>({ h, s: studentById(h.studentId) }));

    // ---------------- workbook ----------------
    const wb = new ExcelJS.Workbook();
    wb.creator = '남쌤 ERC 학원';
    wb.created = now;

    const dash = wb.addWorksheet('대시보드', { views:[{ showGridLines:false }] });
    dash.columns = [{width:16},{width:22},{width:12},{width:8},{width:14},{width:14},{width:14},{width:14}];

    const titleRow = dash.getRow(1);
    dash.mergeCells(1,1,1,8);
    titleRow.getCell(1).value = '주안 학원 경영 대시보드';
    titleRow.getCell(1).font = { name:'Malgun Gothic', size:18, bold:true, color:{argb:INK} };
    dash.mergeCells(2,1,2,8);
    const subRow = dash.getRow(2);
    subRow.getCell(1).value = `생성일: ${fmtDate(now)}`;
    subRow.getCell(1).font = { italic:true, size:10, color:{argb:SOFT} };

    // KPI cards
    const kpis = [
      ['재원생 수', totalActive, '전체 등록 '+DB.students.length+'명 중'],
      ['이번 달 신규', '+'+newThisMonth, thisMonth+' 등록 기준'],
      ['이번 달 퇴원', '-'+withdrawnThisMonth, thisMonth+' 퇴원 처리 기준'],
      ['위험군/관찰필요', riskCount+' / '+watchCount, '재원생 기준'],
    ];
    let kpiCol = 1;
    kpis.forEach(([label, val, sub])=>{
      dash.mergeCells(4, kpiCol, 4, kpiCol+1);
      dash.mergeCells(5, kpiCol, 5, kpiCol+1);
      dash.mergeCells(6, kpiCol, 6, kpiCol+1);
      const l = dash.getCell(4, kpiCol); l.value = label; l.font = { bold:true, size:10, color:{argb:SOFT} };
      const v = dash.getCell(5, kpiCol); v.value = val; v.font = { name:'Malgun Gothic', size:20, bold:true, color:{argb:INK} };
      const su = dash.getCell(6, kpiCol); su.value = sub; su.font = { size:9, color:{argb:SOFT} };
      for(let rr=4; rr<=6; rr++){
        for(let cc=kpiCol; cc<=kpiCol+1; cc++){
          dash.getCell(rr,cc).fill = { type:'pattern', pattern:'solid', fgColor:{argb:CREAM} };
        }
      }
      kpiCol += 2;
    });

    let r = 9;
    function sectionHeader(text){
      dash.mergeCells(r,1,r,8);
      const c = dash.getCell(r,1);
      c.value = text;
      c.font = { bold:true, size:13, color:{argb:NAVY} };
      r += 1;
    }
    function tableHeader(cols){
      cols.forEach((label, i)=>{
        const c = dash.getCell(r, i+1);
        c.value = label;
        c.font = { bold:true, color:{argb:'FFFFFFFF'} };
        c.fill = { type:'pattern', pattern:'solid', fgColor:{argb:NAVY} };
        c.alignment = { horizontal:'center', vertical:'middle' };
      });
      r += 1;
    }

    sectionHeader('반별 인원 분포 (재원생 기준)');
    tableHeader(['반', '인원', '분포']);
    classCounts.forEach(({label, n})=>{
      dash.getCell(r,1).value = label;
      dash.getCell(r,2).value = n;
      dash.mergeCells(r,3,r,8);
      const barCell = dash.getCell(r,3);
      barCell.value = textBar(n, maxClassCount) + '  ' + n + '명';
      barCell.font = { name:'Consolas', color:{argb:BRASS} };
      r += 1;
    });
    r += 1;

    sectionHeader('학교별 분포 (상위 ' + schoolList.length + '곳)');
    tableHeader(['학교', '인원', '분포']);
    schoolList.forEach(([sc, n])=>{
      dash.getCell(r,1).value = sc;
      dash.getCell(r,2).value = n;
      dash.mergeCells(r,3,r,8);
      const barCell = dash.getCell(r,3);
      barCell.value = textBar(n, maxSchool) + '  ' + n + '명';
      barCell.font = { name:'Consolas', color:{argb:NAVY} };
      r += 1;
    });
    if(schoolList.length===0){ dash.getCell(r,1).value = '학교 정보가 입력된 학생이 없어요'; r += 1; }
    r += 1;

    sectionHeader('유입경로별 신규 등록 분포');
    tableHeader(['채널', '인원', '분포']);
    chanList.forEach(([ch, n])=>{
      dash.getCell(r,1).value = ch;
      dash.getCell(r,2).value = n;
      dash.mergeCells(r,3,r,8);
      const barCell = dash.getCell(r,3);
      barCell.value = textBar(n, maxChan) + '  ' + n + '명';
      barCell.font = { name:'Consolas', color:{argb:BRASS} };
      r += 1;
    });
    if(chanUnknown > 0){
      dash.getCell(r,1).value = '경로 미입력';
      dash.getCell(r,2).value = chanUnknown;
      dash.mergeCells(r,3,r,8);
      dash.getCell(r,3).value = textBar(chanUnknown, maxChan) + '  ' + chanUnknown + '명';
      dash.getCell(r,3).font = { name:'Consolas', color:{argb:SOFT} };
      r += 1;
    }
    r += 1;

    sectionHeader('형제자매 등록 비율 / 평균 재원 기간');

    sectionHeader('최근 퇴원 학생 (최근 8건)');

    URL.revokeObjectURL(url);
    toast('엑셀 대시보드를 다운로드했어요');
  }catch(e){
    console.error('엑셀 생성 실패', e);
    toast('엑셀 파일 생성에 실패했어요. 인터넷 연결을 확인하고 다시 시도해주세요.', true);
  }finally{
    if(btn) btn.disabled = false;
  }
}

function downloadBackup(){
  const payload = {
    _meta: { app:'남쌤 ERC 학원 시험·숙제 체크', exportedAt: new Date().toISOString(), version: STORAGE_KEY },
    data: DB,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = fmtDate(new Date());
  a.href = url;
  a.download = `남쌤ERC학원_백업_${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  DB.settings.lastBackupAt = new Date().toISOString();
  saveDB();
  toast('백업 파일을 다운로드했어요');
}

async function restoreBackup(file){
  if(!file) return;
  if(!confirm('현재 화면의 모든 데이터가 백업 파일 내용으로 완전히 덮어써집니다.\n계속할까요?')){ return; }
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    const incoming = parsed && parsed.data ? parsed.data : parsed; // _meta 래핑 유무 모두 지원
    if(!incoming || !Array.isArray(incoming.students)){
      toast('올바른 백업 파일이 아니에요', true);
      return;
    }
    DB = Object.assign({
      students: [], examRecords: [], homeworkRecords: [], videoNotes: {}, remedial: {},
      classHistory: [], statusHistory: [], holidays: [],
      settings: { scoreThreshold:70, examThresholds:{alpha:70,monthly:70,word_meaning:70,phonics:70}, yellowIssueCount:1, redIssueCount:2, videoClasses: CLASS_HAS_VIDEO.slice(), rolePins:{director:'',exam_teacher:'',video_teacher:''}, watchWindowWeeks:3, watchThreshold:2 },
    }, incoming);
    if(DB.settings && DB.settings.videoClasses && DB.settings.videoClasses.length){
      CLASS_HAS_VIDEO = DB.settings.videoClasses.slice();
    }
    const ok = await saveDB();
    if(ok){
      toast('백업 파일을 불러왔어요');
      renderView(currentView);
    }
  }catch(e){
    console.error(e);
    toast('파일을 읽는 중 문제가 발생했어요. 올바른 백업 파일인지 확인해주세요.', true);
  }
}

async function saveClassDisplayCodes(){
  const map = {};
  CLASSES.forEach(c=>{
    const v = document.getElementById(`cc-${c}`).value.trim();
    if(v) map[c] = v;
  });
  DB.settings.classDisplayCode = map;
  const ok = await saveDB();
  renderView('settings');
  if(ok) toast('반 이름 코드를 저장했어요');
}
async function saveSettings(){
  DB.settings.examThresholds = {
    alpha: Number(document.getElementById('st-th-alpha').value)||70,
    monthly: Number(document.getElementById('st-th-monthly').value)||70,
    word_meaning: Number(document.getElementById('st-th-word_meaning').value)||70,
    phonics: Number(document.getElementById('st-th-phonics').value)||70,
  };
  DB.settings.yellowIssueCount = Number(document.getElementById('st-yellow').value)||1;
  DB.settings.redIssueCount = Number(document.getElementById('st-red').value)||2;
  const watchWindow = Number(document.getElementById('st-watch-window').value)||3;
  const watchThreshold = Number(document.getElementById('st-watch-threshold').value)||2;
  if(watchThreshold>watchWindow){
    toast('관찰 필요 기준(몇 주 이상)이 전체 기간(최근 몇 주)보다 클 수 없어요', true);
    return;
  }
  DB.settings.watchWindowWeeks = watchWindow;
  DB.settings.watchThreshold = watchThreshold;
  const ok = await saveDB();
  if(ok) toast('설정을 저장했어요');
}
async function toggleClassExam(cls, examKey, checked){
  const list = CLASS_EXAMS[cls];
  if(checked && !list.includes(examKey)) list.push(examKey);
  if(!checked) CLASS_EXAMS[cls] = list.filter(k=>k!==examKey);
  toast(`${classLabel(cls)} · ${EXAM_META[examKey].name} ${checked?'추가':'제외'}됨`);
}
async function toggleClassVideo(cls, checked){
  if(checked && !CLASS_HAS_VIDEO.includes(cls)) CLASS_HAS_VIDEO.push(cls);
  if(!checked) CLASS_HAS_VIDEO = CLASS_HAS_VIDEO.filter(c=>c!==cls);
  DB.settings.videoClasses = CLASS_HAS_VIDEO.slice();
  const ok = await saveDB();
  if(ok) toast(`${classLabel(cls)} 영상숙제 대상 ${checked?'포함':'제외'}됨`);
}

/* ---------------------- 16. 초기화 ---------------------- */

async function init(){
  document.getElementById('today-label').textContent = fmtDateKR(new Date());
  renderLogin();
  const loaded = await loadDB();
  if(!loaded || !DB.students || DB.students.length===0){
    seedDemoData();
    await saveDB();
  }
  if(DB.settings.videoClasses && DB.settings.videoClasses.length){
    CLASS_HAS_VIDEO = DB.settings.videoClasses.slice();
  } else {
    DB.settings.videoClasses = CLASS_HAS_VIDEO.slice();
  }
  startRealtimeSync();
}
init();
